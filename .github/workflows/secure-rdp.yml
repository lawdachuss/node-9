name: Secure RDP

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Record Start Time and Enforce Timing Rules
        shell: powershell
        run: |
          $epoch = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          echo "START_TIME=$epoch" >> $env:GITHUB_ENV
          Write-Host "Workflow started at Unix epoch: $epoch"
          
          $currentRunId = "$env:GITHUB_RUN_ID"
          if ([string]::IsNullOrEmpty($currentRunId)) {
            Write-Host "Local testing or missing run ID. Skipping check."
            exit 0
          }
          
          # Fetch recent runs of the same workflow
          $runsJson = gh run list --workflow secure-rdp.yml --repo "$env:GITHUB_REPOSITORY" --limit 10 --json databaseId,status,conclusion,startedAt
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Failed to fetch run list from GitHub API. Proceeding..."
            exit 0
          }
          
          $runs = $runsJson | ConvertFrom-Json
          $hasActiveOverlap = $false
          
          foreach ($run in $runs) {
            if ($run.databaseId -ne $currentRunId -and $run.status -eq 'in_progress' -and ($null -eq $run.conclusion -or $run.conclusion -eq '')) {
              $startedAt = [DateTime]::Parse($run.startedAt).ToUniversalTime()
              $now = [DateTime]::UtcNow
              $elapsedMinutes = ($now - $startedAt).TotalMinutes
              
              Write-Host "Found other active run: ID=$($run.databaseId), StartedAt=$startedAt ($elapsedMinutes minutes ago)"
              
              if ($elapsedMinutes -lt 348) {
                $hasActiveOverlap = $true
                break
              }
            } else {
              if ($run.databaseId -ne $currentRunId) {
                Write-Host "Skipping run ID=$($run.databaseId) (status=$($run.status), conclusion=$($run.conclusion))"
              }
            }
          }
          
          if ($hasActiveOverlap) {
            Write-Host "Another active workflow run was started recently (less than 5 hours and 55 minutes ago)."
            Write-Host "Cancelling this run to enforce timing rules and prevent overlap..."
            gh run cancel $currentRunId --repo "$env:GITHUB_REPOSITORY"
            Start-Sleep -Seconds 60
            exit 1
          } else {
            Write-Host "Timing check passed. No overlapping active runs found."
          }

      - name: Connect Netherlands Proxy (SOCKS5)
        shell: powershell
        run: |
          function log { param($m) Write-Host $m; [System.Console]::Out.Flush() }

          function Fetch-Proxies($url) {
            try {
              $raw = Invoke-RestMethod -Uri $url -Method Get -TimeoutSec 15 -ErrorAction Stop
              $list = @()
              foreach ($line in ($raw -split "`n")) {
                $t = $line.Trim()
                if ($t -eq "" -or $t -match '^#') { continue }
                if ($t -match '^socks5://') { $list += $t }
                elseif ($t -match '^(\d+\.\d+\.\d+\.\d+):(\d+)$') { $list += "socks5://$t" }
              }
              return $list
            } catch { return @() }
          }

          # -- If a PROXY_URLS secret is set, use it directly and skip discovery --
          $secretProxy = "${{ secrets.PROXY_URLS }}"
          if (-not [string]::IsNullOrWhiteSpace($secretProxy)) {
            log "=== Using pre-configured PROXY_URLS secret ==="
            $secretList = @($secretProxy -split '[,\s]+' | Where-Object { $_ -match '^socks5://' })
            if ($secretList.Count -gt 0) {
              $primary = $secretList[0]
              echo "PROXY_URL=$($secretList -join ',')" >> $env:GITHUB_ENV
              echo "ALL_PROXY=$primary" >> $env:GITHUB_ENV
              echo "all_proxy=$primary" >> $env:GITHUB_ENV
              echo "SOCKS_PROXY=$primary" >> $env:GITHUB_ENV
              & git config --global http.proxy $primary
              & git config --global https.proxy $primary
              try {
                $ip  = curl.exe -x $primary -s -m 10 https://api.ipify.org 2>$null
                $loc = curl.exe -x $primary -s -m 10 https://ipinfo.io/json 2>$null | ConvertFrom-Json
                log "Public IP: $ip / $($loc.country) - $($loc.org)"
              } catch { log "Verification skipped: $_" }
              $LASTEXITCODE = 0; log "[OK] SOCKS5 proxy configured from secret."; exit 0
            }
          }

          log "=== Fetching live SOCKS5 proxies ==="
          $allProxies = @()

          # NL-specific (highest priority)
          log "Fetching NL proxies..."
          $allProxies += Fetch-Proxies "https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&format=text&protocol=socks5&country=nl&timeout=5000"
          log "  NL so far: $($allProxies.Count)"

          # IN-specific
          log "Fetching IN proxies..."
          $allProxies += Fetch-Proxies "https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&format=text&protocol=socks5&country=in&timeout=5000"
          log "  NL+IN so far: $($allProxies.Count)"

          # DE-specific (geographically close to NL)
          log "Fetching DE proxies..."
          $allProxies += Fetch-Proxies "https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&format=text&protocol=socks5&country=de&timeout=5000"

          # Broad community lists
          $allProxies += Fetch-Proxies "https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/socks5.txt"
          $allProxies += Fetch-Proxies "https://raw.githubusercontent.com/hookzof/socks5_list/master/proxy.txt"
          $allProxies += Fetch-Proxies "https://cdn.jsdelivr.net/gh/proxyscrape/free-proxy-list@main/proxies/countries/nl/socks5/data.txt"

          $allProxies = ($allProxies | Select-Object -Unique | Sort-Object { Get-Random }) | Select-Object -First 120
          log "Total unique proxies to test (capped at 120): $($allProxies.Count)"

          if ($allProxies.Count -eq 0) {
            log "WARNING: No proxies fetched. Using emergency fallback list."
            $allProxies = @(
              "socks5://5.255.117.250:1080",
              "socks5://185.233.184.165:1080",
              "socks5://5.255.113.177:1080",
              "socks5://103.139.106.174:1080",
              "socks5://103.139.106.200:1080"
            )
          }

          log ""
          log "=== Phase 1: Liveness test (batches of 10, 30s timeout per batch) ==="
          # Only check if proxy is alive (returns an IP) -- fast, parallel
          # The critical fix: Wait-Job -Timeout 30 (was 5, which killed jobs before curl could finish)
          $aliveTestBlock = {
            param($proxyUrl)
            try {
              $ip = curl.exe -x $proxyUrl -s --connect-timeout 3 -m 6 https://api.ipify.org 2>$null
              if ($ip -match '^\d+\.\d+\.\d+\.\d+$') {
                return @{ url = $proxyUrl; ip = $ip.Trim() }
              }
            } catch {}
            return $null
          }

          $aliveProxies = [System.Collections.ArrayList]@()
          for ($i = 0; $i -lt $allProxies.Count; $i += 10) {
            $batch = $allProxies[$i..([math]::Min($i+9, $allProxies.Count-1))]
            $jobs  = @($batch | ForEach-Object { Start-Job -ScriptBlock $aliveTestBlock -ArgumentList $_ })
            $null  = $jobs | Wait-Job -Timeout 30 -ErrorAction SilentlyContinue
            foreach ($j in $jobs) {
              $r = Receive-Job $j -ErrorAction SilentlyContinue
              if ($r -and $r.url) { [void]$aliveProxies.Add($r) }
              Remove-Job $j -Force -ErrorAction SilentlyContinue
            }
            log "  Batch $([math]::Floor($i/10)+1): $($aliveProxies.Count) alive so far"
            if ($aliveProxies.Count -ge 20) { log "  Enough candidates, stopping early."; break }
          }
          log "  Phase 1 done: $($aliveProxies.Count) alive proxies found"

          log ""
          log "=== Phase 2: Chaturbate reachability + geo-lookup ==="
          $cleanProxies  = [System.Collections.ArrayList]@()
          $blockedProxies= [System.Collections.ArrayList]@()

          foreach ($w in $aliveProxies) {
            $cbOut       = curl.exe -x $w.url -s -o NUL -w "%{http_code} %{url_effective}" -L --connect-timeout 3 -m 8 https://chaturbate.com 2>$null
            $parts       = $cbOut -split ' ', 2
            $cbCode      = $parts[0]
            $cbFinalUrl  = if ($parts.Count -gt 1) { $parts[1] } else { "" }
            $faceId      = ($cbFinalUrl -match '(?i)(verify|auth|captcha|face|human|robot)')
            $cbOk        = ($cbCode -eq "200")

            # Geo-lookup directly (no extra proxy hop needed -- IP is already known)
            $country = ""; $org = ""
            try {
              $locRaw = curl.exe -s --connect-timeout 3 -m 5 "http://ip-api.com/json/$($w.ip)?fields=countryCode,org" 2>$null
              if ($locRaw) {
                $loc = $locRaw | ConvertFrom-Json -ErrorAction SilentlyContinue
                if ($loc -and $loc.countryCode) { $country = $loc.countryCode; $org = $loc.org }
              }
            } catch {}

            $entry = @{ url=$w.url; ip=$w.ip; country=$country; org=$org; faceIdBlocked=$faceId; cbReachable=$cbOk }
            log "  [$country] $($w.ip) cb=$cbOk faceID=$faceId  $($w.url)"

            if ($cbOk -and -not $faceId)  { [void]$cleanProxies.Add($entry) }
            elseif ($cbOk)               { [void]$blockedProxies.Add($entry) }
          }
          log "  Clean: $($cleanProxies.Count), Face-ID blocked: $($blockedProxies.Count)"

          # -- Pick best proxies (prefer NL/IN/DE, then any) ------------------
          $preferredCountries = @("NL","IN","DE")
          $workingProxies = @()

          # Pass 1: clean proxies in preferred countries
          foreach ($w in ($cleanProxies | Sort-Object { if ($_.country -in $preferredCountries) { 0 } else { 1 } })) {
            if ($workingProxies.Count -ge 5) { break }
            $workingProxies += $w
            log "CLEAN #$($workingProxies.Count): $($w.url) [$($w.country)] IP=$($w.ip)"
          }
          # Pass 2: face-ID blocked if still 0
          if ($workingProxies.Count -eq 0) {
            foreach ($w in ($blockedProxies | Sort-Object { if ($_.country -in $preferredCountries) { 0 } else { 1 } })) {
              if ($workingProxies.Count -ge 3) { break }
              $workingProxies += $w
              log "FACE-ID #$($workingProxies.Count): $($w.url) [$($w.country)] IP=$($w.ip)"
            }
          }
          # Pass 3: any alive proxy (skip CB check entirely)
          if ($workingProxies.Count -eq 0) {
            foreach ($w in $aliveProxies) {
              if ($workingProxies.Count -ge 1) { break }
              $workingProxies += $w
              log "ALIVE-FALLBACK #1: $($w.url) IP=$($w.ip)"
            }
          }

          if ($workingProxies.Count -eq 0) {
            Write-Error "No working SOCKS5 proxy found after testing all sources."
            log ""
            log "TROUBLESHOOTING:"
            log "1. GitHub Actions runners are in US/VA -- Chaturbate often requires NL or IN IP"
            log "2. Free proxy lists rotate rapidly; most are dead within hours"
            log "3. FIX: Set a PROXY_URLS secret with your own working SOCKS5 proxy:"
            log "   e.g. PROXY_URLS=socks5://user:pass@your-proxy.com:1080"
            log "   Get free proxies: https://www.webshare.io/ (10 free)"
            exit 1
          }

          log ""
          if ($workingProxies.Count -gt 0) {
            log "=== Collected $($workingProxies.Count) working proxies ==="
            $primary = $workingProxies[0].url
            $proxyUrlList = ($workingProxies | ForEach-Object { $_.url }) -join ","

            echo "PROXY_URL=$proxyUrlList" >> $env:GITHUB_ENV
            echo "ALL_PROXY=$primary"     >> $env:GITHUB_ENV
            echo "all_proxy=$primary"     >> $env:GITHUB_ENV
            echo "SOCKS_PROXY=$primary"   >> $env:GITHUB_ENV

            & git config --global http.proxy  $primary
            & git config --global https.proxy $primary

            log "[OK] Git configured to use $primary"
            log "[OK] PROXY_URL set with $($workingProxies.Count) proxies for rotation"
            foreach ($wp in $workingProxies) {
              log "  [$($wp.country)] $($wp.url) (IP: $($wp.ip) - $($wp.org))"
            }

            log ""
            log "Verifying primary proxy egress..."
            try {
              $ip  = curl.exe -x $primary -s -m 10 https://api.ipify.org 2>$null
              $LASTEXITCODE = 0
              $loc = curl.exe -x $primary -s -m 10 https://ipinfo.io/json 2>$null | ConvertFrom-Json
              $LASTEXITCODE = 0
              log "Public IP: $ip / $($loc.country) - $($loc.org)"
            } catch { log "Verification failed: $_" }
            $LASTEXITCODE = 0
            log "[OK] SOCKS5 proxy configured."
          } else {
            log "=== No proxies configured - DVR will connect directly ==="
          }

      - name: Configure Windows RDP
        shell: powershell
        run: |
          Write-Host "Configuring RDP..."

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fSingleSessionPerUser" -Value 0 -Force

          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False -ErrorAction SilentlyContinue
          Stop-Service -Name mpssvc -Force -ErrorAction SilentlyContinue
          Set-Service -Name mpssvc -StartupType Disabled -ErrorAction SilentlyContinue

          Restart-Service TermService -Force
          Start-Sleep -Seconds 5

          Write-Host "[OK] RDP configured and listening on port 3389"

      - name: Create RDP User
        shell: powershell
        run: |
          $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'
          $password = -join ((1..20) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser -Name "RDP" }
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          echo "RDP_PASSWORD=$password" >> $env:GITHUB_ENV
          Write-Host "[OK] RDP user created"

      - name: Install Tailscale
        shell: powershell
        run: |
          Write-Host "Installing Tailscale..."
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installer = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /qn /norestart" -Wait
          Remove-Item $installer -Force
          Write-Host "[OK] Tailscale installed"

      - name: Install FFmpeg
        shell: powershell
        run: |
          # Bypass SOCKS5 proxy for Chocolatey - it needs direct HTTPS access
          $savedAllProxy = $env:ALL_PROXY
          $savedHttpProxy = $env:HTTP_PROXY
          $savedHttpsProxy = $env:HTTPS_PROXY
          Remove-Item Env:ALL_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:all_proxy -ErrorAction SilentlyContinue
          Remove-Item Env:HTTP_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:HTTPS_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:http_proxy -ErrorAction SilentlyContinue
          Remove-Item Env:https_proxy -ErrorAction SilentlyContinue
          $env:NO_PROXY = "community.chocolatey.org,chocolatey.org"
          Write-Host "Installing FFmpeg via Chocolatey..."
          choco install ffmpeg -y --no-progress
          Write-Host "[OK] FFmpeg installed"
          refreshenv
          $ffver = & ffmpeg.exe -version 2>&1
          Write-Host "Version: $($ffver | Select-Object -First 1)"
          if ($savedAllProxy) { $env:ALL_PROXY = $savedAllProxy; $env:all_proxy = $savedAllProxy }
          if ($savedHttpProxy) { $env:HTTP_PROXY = $savedHttpProxy }
          if ($savedHttpsProxy) { $env:HTTPS_PROXY = $savedHttpsProxy }

      - name: Check Tailscale Auth Key
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAILSCALE_AUTH_KEY)) {
            Write-Error "TAILSCALE_AUTH_KEY secret is EMPTY or NOT SET"
            Write-Host "Go to: https://github.com/lawdachuss/rdp-goondvr/settings/secrets/actions"
            exit 1
          }
          Write-Host "[OK] TAILSCALE_AUTH_KEY is set (length: $($env:TAILSCALE_AUTH_KEY.Length))"

      - name: Connect Tailscale
        shell: powershell
        run: |
          $tailscale = "$env:ProgramFiles\Tailscale\tailscale.exe"

          $svc = Get-Service -Name Tailscale -ErrorAction SilentlyContinue
          if ($null -eq $svc) { Write-Error "Tailscale service not found"; exit 1 }
          if ($svc.Status -ne 'Running') { Start-Service Tailscale -ErrorAction Stop }

          Write-Host "Waiting for Tailscale daemon..."
          $ready = $false
          for ($i = 0; $i -lt 15; $i++) {
            try {
              $out = & $tailscale status 2>&1
              if ($LASTEXITCODE -eq 0 -or ($out -match "Logged out|NeedsLogin|Running|stopped")) { $ready = $true; break }
            } catch {}
            Start-Sleep -Seconds 2
          }
          if (-not $ready) { Write-Error "Tailscale daemon not ready after 30s"; exit 1 }

          Write-Host "Authenticating Tailscale..."
          & $tailscale up `
            --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
            --hostname="github-rdp-${{ github.run_id }}" `
            --accept-routes `
            --accept-dns=false `
            --timeout=60s
          if ($LASTEXITCODE -ne 0) { Write-Error "tailscale up failed"; exit 1 }

          Write-Host "-------- TAILSCALE STATUS --------"
          & $tailscale status

          $ip = $null
          for ($attempt = 0; $attempt -lt 2; $attempt++) {
            $ip = $null
            for ($i = 0; $i -lt 15; $i++) {
              try {
                $candidate = (& $tailscale ip -4 2>&1 | Select-Object -First 1).Trim()
                if ($candidate -match '^\d+\.\d+\.\d+\.\d+$') { $ip = $candidate; break }
              } catch {}
              Start-Sleep -Seconds 3
            }
            if ($ip) { break }
            Write-Host "Retrying Tailscale auth (attempt $($attempt+1))..."
            & $tailscale logout
            Start-Sleep -Seconds 3
            & $tailscale up `
              --authkey="${{ secrets.TAILSCALE_AUTH_KEY }}" `
              --hostname="github-rdp-${{ github.run_id }}" `
              --accept-routes `
              --accept-dns=false `
              --timeout=60s `
              --reset
            if ($LASTEXITCODE -ne 0) { Write-Error "tailscale up retry failed"; exit 1 }
            Start-Sleep -Seconds 5
          }
          if (-not $ip) { Write-Error "No Tailscale IP assigned after 45s"; exit 1 }

          echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "[OK] Tailscale IP: $ip"
          $LASTEXITCODE = 0

      - name: Verify Proxy + Tailscale
        shell: powershell
        run: |
          Write-Host "=== PROXY SETTINGS ==="
          Write-Host "ALL_PROXY=$env:ALL_PROXY"
          Write-Host "GIT proxy: $(git config --global http.proxy)"
          Write-Host ""
          Write-Host "=== TAILSCALE ==="
          if ($env:TAILSCALE_IP) { Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue | Select-Object ComputerName, TcpTestSucceeded }

      - name: Verify RDP via Tailscale
        shell: powershell
        run: |
          Write-Host "Checking RDP on $env:TAILSCALE_IP:3389..."
          $success = $false
          for ($i = 0; $i -lt 10; $i++) {
            $test = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 -WarningAction SilentlyContinue
            if ($test.TcpTestSucceeded) { $success = $true; break }
            Write-Host "Attempt $($i+1)/10 failed, retrying in 10s..."
            Start-Sleep -Seconds 10
          }
          if (-not $success) { Write-Error "RDP port 3389 not reachable on $env:TAILSCALE_IP after 100s"; exit 1 }
          Write-Host "[OK] RDP reachable via Tailscale."

      - name: Clone node-3 to D:\
        shell: powershell
        run: |
          $repoDir = "D:\repos\node-3"
          New-Item -ItemType Directory -Force -Path "D:\repos" | Out-Null
          if (Test-Path $repoDir) { Remove-Item -Recurse -Force $repoDir }
          Write-Host "Using checked-out repo code (commit: $(git rev-parse --short HEAD))..."
          
          # Use the already-checked-out code from actions/checkout
          # This ensures CI always uses the latest code from this repo
          New-Item -ItemType Directory -Force -Path $repoDir | Out-Null
          Copy-Item -Path "$env:GITHUB_WORKSPACE\*" -Destination $repoDir -Recurse -Force
          Write-Host "[OK] Copied local repo to $repoDir"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Scrapling (Python Cloudflare bypass)
        shell: powershell
        run: |
          # Unset proxy vars - pip doesn't support SOCKS5
          $savedAll = $env:ALL_PROXY; Remove-Item Env:ALL_PROXY -ErrorAction SilentlyContinue
          $savedHttp = $env:HTTP_PROXY; Remove-Item Env:HTTP_PROXY -ErrorAction SilentlyContinue
          $savedHttps = $env:HTTPS_PROXY; Remove-Item Env:HTTPS_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:all_proxy,Env:http_proxy,Env:https_proxy -ErrorAction SilentlyContinue
          pip install "scrapling[fetchers]"
          if ($LASTEXITCODE -ne 0) { throw "pip install scrapling failed" }
          python -m playwright install chromium
          if ($LASTEXITCODE -ne 0) { Write-Warning "playwright install chromium failed" }
          # Restore proxy vars
          if ($savedAll) { $env:ALL_PROXY = $savedAll; $env:all_proxy = $savedAll }
          if ($savedHttp) { $env:HTTP_PROXY = $savedHttp }
          if ($savedHttps) { $env:HTTPS_PROXY = $savedHttps }
          Write-Host "[OK] Scrapling installed"

      - name: Refresh Chaturbate Cookies via Go Grabber (through SOCKS5 proxy)
        shell: powershell
        env:
          MINI_ENV: ${{ secrets.MINI_ENV }}
        run: |
          $repoDir = "D:\repos\node-3"
          if (-not (Test-Path $repoDir)) { Write-Error "Repo not found at $repoDir"; exit 1 }

          # Write .env from secret so the grabber has the base config
          if (-not [string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
            [System.IO.File]::WriteAllText("$repoDir\.env", $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "[OK] Wrote .env from secret"
          } else {
            Write-Warning "MINI_ENV secret is empty - cookie grabber may have no base config"
          }

          # Keep existing COOKIES in .env so the grabber can merge old cf_clearance
          # with fresh __cf_bm.  If we cleared them and the proxy can't solve the
          # Cloudflare challenge, the DVR would lose cf_clearance entirely.
          $envPath = "$repoDir\.env"

          Set-Location $repoDir

          # Build the Go cookie grabber
          # Temporarily remove proxy env vars so Go can download modules directly
          $savedAllProxy = $env:ALL_PROXY
          $savedHttpProxy = $env:HTTP_PROXY
          $savedHttpsProxy = $env:HTTPS_PROXY
          Remove-Item Env:ALL_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:all_proxy -ErrorAction SilentlyContinue
          Remove-Item Env:HTTP_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:HTTPS_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:http_proxy -ErrorAction SilentlyContinue
          Remove-Item Env:https_proxy -ErrorAction SilentlyContinue
          $env:GOPROXY = "https://proxy.golang.org,direct"
          $env:GONOSUMDB = "*"
          $env:GONOSUMCHECK = "*"
          $env:GOFLAGS = "-mod=mod"
          Write-Host "Building cookie grabber..."
          Write-Host "  Go env: $(go env GOPROXY GONOSUMDB GONOSUMCHECK GOFLAGS)"
          $oldEAP = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          $buildOut = go build -o grab-cookies.exe ./cmd/grab_cookies 2>&1
          $buildExit = $LASTEXITCODE
          $ErrorActionPreference = $oldEAP
          # Restore proxy env vars after build
          if ($savedAllProxy) { $env:ALL_PROXY = $savedAllProxy; $env:all_proxy = $savedAllProxy }
          if ($savedHttpProxy) { $env:HTTP_PROXY = $savedHttpProxy }
          if ($savedHttpsProxy) { $env:HTTPS_PROXY = $savedHttpsProxy }
          if ($buildExit -ne 0) {
            Write-Host "Build failed (exit $buildExit). Full output:"
            $buildOut | ForEach-Object { Write-Host "  $_" }
            Write-Host "Falling back to old COOKIES from secret - rewriting .env"
            if (-not [string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
              [System.IO.File]::WriteAllText($envPath, $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
            }
            exit 1
          }
          Write-Host "[OK] Grabber built"

          # Run the grabber - it reads PROXY_URL/ALL_PROXY from env (set by proxy step),
          # connects to Chaturbate through the SOCKS5 tunnel, gets fresh cookies,
          # and writes them to .env.
          Write-Host "Running cookie grabber through proxy..."
          Write-Host "  PROXY_URL=$env:PROXY_URL"
          $oldEAP = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          .\grab-cookies.exe 2>&1
          $grabExit = $LASTEXITCODE
          $ErrorActionPreference = $oldEAP

          Remove-Item .\grab-cookies.exe -Force -ErrorAction SilentlyContinue

          if ($grabExit -ne 0) {
            Write-Warning "Cookie grabber exited with code $grabExit - falling back to old COOKIES from secret"
            if (-not [string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
              [System.IO.File]::WriteAllText($envPath, $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
              Write-Host "[OK] Restored old COOKIES from secret - DVR will continue with existing cookies"
            } else {
              Write-Error "No MINI_ENV secret set - cannot recover cookies"
              exit 1
            }
          }

          # Verify cookies were written
          $envContent = Get-Content $envPath -Raw -ErrorAction SilentlyContinue
          if ($envContent -match '(?m)^COOKIES=') {
            Write-Host "[OK] Cookies written to .env"
          } else {
            Write-Warning "COOKIES not found in .env after grabber - falling back"
            if (-not [string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
              [System.IO.File]::WriteAllText($envPath, $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
            }
            exit 1
          }

      - name: Write .env + install deps + create scheduled tasks
        shell: powershell
        env:
          MINI_ENV: ${{ secrets.MINI_ENV }}
        run: |
          $repoDir = "D:\repos\node-3"
          if (-not (Test-Path $repoDir)) { Write-Error "Repo not found"; exit 1 }

          # Save fresh cookies and user-agent from the grabber step before they get overwritten
          $freshEnv = Get-Content "$repoDir\.env" -Raw -ErrorAction SilentlyContinue
          $freshCookies = if ($freshEnv -match '(?m)^COOKIES=.*$') { $matches[0] } else { "" }
          $freshUA = if ($freshEnv -match '(?m)^USER_AGENT=.*$') { $matches[0] } else { "" }

          if ([string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
            Write-Warning "Secret 'env' is empty - skipping .env file"
          } else {
            # Write .env to repo directory (may overwrite fresh cookies - restored below)
            [System.IO.File]::WriteAllText("$repoDir\.env", $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "[OK] Wrote .env file to $repoDir\.env"
            
            # Verify .env was written
            if (Test-Path "$repoDir\.env") {
              $envSize = (Get-Item "$repoDir\.env").Length
              Write-Host "[OK] Verified .env exists ($envSize bytes)"
            } else {
              Write-Error ".env file was not created"
              exit 1
            }
          }

          # Restore fresh cookies and user-agent from grabber (don't overwrite with stale secret values)
          if ($freshCookies -ne "") {
            $currentContent = Get-Content "$repoDir\.env" -Raw -ErrorAction SilentlyContinue
            $currentContent = $currentContent -replace '(?m)^COOKIES=.*$', $freshCookies
            if ($freshUA -ne "") {
              $currentContent = $currentContent -replace '(?m)^USER_AGENT=.*$', $freshUA
            }
            [System.IO.File]::WriteAllText("$repoDir\.env", $currentContent, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "[OK] Restored fresh cookies from grabber (not using stale secret values)"
          }

          Set-Location $repoDir

          # Run setup.bat - exclude PyPI from proxy so pip can download deps
          $env:NO_PROXY = "pypi.org,files.pythonhosted.org,*.pythonhosted.org"
          $env:no_proxy = "pypi.org,files.pythonhosted.org,*.pythonhosted.org"
          if (Test-Path ".\setup.bat") {
            Write-Host "=== Running setup.bat with -NoAppStart ==="
            cmd /c ".\setup.bat -NoAppStart"
            if ($LASTEXITCODE -ne 0) { Write-Error "setup.bat failed"; exit 1 }
            Write-Host "[OK] setup.bat completed"
          }
          Remove-Item Env:NO_PROXY -ErrorAction SilentlyContinue
          Remove-Item Env:no_proxy -ErrorAction SilentlyContinue

          # Step 2: Verify binary exists
          $dvrExe = "$repoDir\chaturbate-dvr.exe"
          if (-not (Test-Path $dvrExe)) { Write-Error "Binary not found: $dvrExe"; exit 1 }
          Write-Host "[OK] Binary exists at $dvrExe ($((Get-Item $dvrExe).Length) bytes)"

          Write-Host "=== Binary validation ==="
          $v = & $dvrExe --version 2>&1
          Write-Host "Version: $v"
          Write-Host "[OK] DVR binary is ready"

          # Create a scheduled task that starts DVR (accessible from all sessions and persists)
          Write-Host "=== Creating system-wide DVR scheduled task ==="
          $taskName = "ChaturbateDVR"
          
          # Create videos directory on D: drive (150GB temp storage)
          $videosDir = "D:\videos"
          New-Item -ItemType Directory -Force -Path $videosDir | Out-Null
          Write-Host "[OK] Created videos directory: $videosDir"
          
          # Remove existing task if present
          Unregister-ScheduledTask -TaskName $taskName -Confirm:$false -ErrorAction SilentlyContinue
          
          # CRITICAL: Create wrapper script that sets proxy environment variables
          # Scheduled tasks don't inherit environment variables, so we need a wrapper
          $wrapperScript = "$repoDir\start-dvr-with-proxy.ps1"
          $proxyUrl = $env:ALL_PROXY
          
          # Wrapper script will be created below with logging support
          
          # Use PowerShell method (cleaner than schtasks with complex paths/arguments)
          # CRITICAL: Set WorkingDirectory to ensure .env is found
          Write-Host "DVR will run from working directory: $repoDir"
          Write-Host "DVR will save videos to: $videosDir"
          Write-Host ".env file location: $repoDir\.env"
          Write-Host "DVR proxy: $proxyUrl"
          
          # Add output redirection to wrapper script for debugging
          $proxyLabel = if ($proxyUrl) { "Netherlands proxy" } else { "direct connection" }
          if ($proxyUrl) {
            $proxyLines = @(
              "`$env:ALL_PROXY = `"$proxyUrl`"",
              "`$env:all_proxy = `"$proxyUrl`"",
              "# NOTE: Do NOT set HTTP_PROXY/HTTPS_PROXY to a SOCKS5 URL!",
              "# Go's http.DefaultTransport uses these for outgoing requests",
              "# and expects an HTTP proxy, not SOCKS5. The DVR uses PROXY_URL",
              "# (via httpcloak) which handles SOCKS5 natively.",
              "`$env:SOCKS_PROXY = `"$proxyUrl`"",
              "# PROXY_URL is already set at workflow level with comma-separated list",
              "# for automatic rotation. Only set if not already present.",
              "if (-not `$env:PROXY_URL) { `$env:PROXY_URL = `"$proxyUrl`" }",
              "if (-not `$env:PROXY_SERVER) { `$env:PROXY_SERVER = `"$proxyUrl`" }"
            )
          } else {
            $proxyLines = @(
              "# No proxy configured - DVR will connect directly",
              "Remove-Item Env:PROXY_URL -ErrorAction SilentlyContinue",
              "Remove-Item Env:ALL_PROXY -ErrorAction SilentlyContinue",
              "Remove-Item Env:SOCKS_PROXY -ErrorAction SilentlyContinue"
            )
          }
          $wrapperLines = @(
            "# DVR Wrapper Script - Sets proxy environment variables before starting DVR",
            "`$logFile = `"$repoDir\dvr-wrapper.log`"",
            "Start-Transcript -Path `$logFile -Append",
            ""
          ) + $proxyLines + @(
            "# Pooled mode env vars (distributed shards)",
            "`$env:CHANNEL_POOL_MODE = `"${{ secrets.CHANNEL_POOL_MODE }}`"",
            "`$env:NODE_ID = `"${{ secrets.NODE_ID }}`"",
            "# Session duration controls how long the DVR records before uploading and cycling",
            "`$env:SESSION_DURATION = `"${{ secrets.SESSION_DURATION }}`"",
            "# Upload host API keys",
            "`$env:VIDHIDE_API_KEY = `"${{ secrets.VIDHIDE_API_KEY }}`"",
            "`$env:STREAMWISH_API_KEY = `"${{ secrets.STREAMWISH_API_KEY }}`"",
            "`$env:USER_AGENT = `"$env:USER_AGENT`"",
            "# Disable HTTP_PROXY/HTTPS_PROXY for Go's default transport",
            "# to prevent Go from trying to use SOCKS5 as HTTP proxy.",
            "# Go's http.DefaultTransport reads these env vars and would",
            "# break on socks5:// URLs (expects http/https proxy).",
            "Remove-Item Env:HTTP_PROXY -ErrorAction SilentlyContinue",
            "Remove-Item Env:HTTPS_PROXY -ErrorAction SilentlyContinue",
            "Remove-Item Env:http_proxy -ErrorAction SilentlyContinue",
            "Remove-Item Env:https_proxy -ErrorAction SilentlyContinue",
            "",
            "Write-Host `"[DVR Wrapper] Starting chaturbate-dvr.exe with $proxyLabel`"",
            "Write-Host `"[DVR Wrapper] Proxy: $proxyUrl`"",
            "Write-Host `"[DVR Wrapper] Working Directory: $repoDir`"",
            "Write-Host `"[DVR Wrapper] Videos Directory: $videosDir`"",
            "Write-Host `"[DVR Wrapper] Time: `$(Get-Date)`"",
            "",
            "Set-Location `"$repoDir`"",
            "",
            "# Check if .env exists",
            "if (Test-Path `".env`") {",
            "    Write-Host `"[DVR Wrapper] .env file found`"",
            "} else {",
            "    Write-Host `"[DVR Wrapper] WARNING: .env file NOT found`"",
            "}",
            "",
            "Write-Host `"[DVR Wrapper] Starting DVR binary...`"",
            "Stop-Transcript",
            "",
            "# Start DVR process with proxy environment",
            "# Redirect stdout/stderr to a log file so we can debug crashes",
            "`$dvrLog = `"$repoDir\dvr-output.log`"",
            "& `"$dvrExe`" --no-tunnel --output-dir `"$videosDir`" *>&1 | Tee-Object -FilePath `"$dvrLog`" -Append"
          )
          $wrapperContent = $wrapperLines -join "`r`n"
          Set-Content -Path $wrapperScript -Value $wrapperContent -Force
          Write-Host "[OK] Created DVR wrapper script with logging: $wrapperScript"
          
          # Run PowerShell wrapper script instead of DVR directly
          # Use -NoExit to keep PowerShell window open for debugging
          $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -NoProfile -File `"$wrapperScript`"" -WorkingDirectory $repoDir
          $trigger = New-ScheduledTaskTrigger -AtStartup
          $principal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -DontStopOnIdleEnd -ExecutionTimeLimit (New-TimeSpan -Hours 0)
          
          Register-ScheduledTask -TaskName $taskName -Action $action -Trigger $trigger -Principal $principal -Settings $settings -Force | Out-Null
          Write-Host "[OK] DVR scheduled task created (with proxy wrapper)"
          
          # Verify task was created
          $taskExists = schtasks /Query /TN $taskName 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Host "[OK] Verified task exists in Task Scheduler"
          } else {
            Write-Warning "Task may not have been created successfully"
          }
          
          Write-Host "[OK] DVR scheduled task created (with proxy wrapper)"
          Write-Host "=== Setting up Cloudflare tunnel ==="
          
          # Download cloudflared to repo directory
          $cloudflaredPath = "$repoDir\cloudflared.exe"
          
          Write-Host "Downloading cloudflared..."
          $downloadSuccess = $false
          $maxRetries = 3
          
          for ($retry = 1; $retry -le $maxRetries; $retry++) {
            try {
              Write-Host "Download attempt $retry/$maxRetries..."
              $ProgressPreference = 'SilentlyContinue'
              Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $cloudflaredPath -UseBasicParsing -TimeoutSec 30
              
              if (Test-Path $cloudflaredPath) {
                $size = (Get-Item $cloudflaredPath).Length
                if ($size -gt 1MB) {
                  Write-Host "[OK] Cloudflared downloaded successfully ($([math]::Round($size/1MB, 2)) MB)"
                  $downloadSuccess = $true
                  break
                } else {
                  Write-Warning "Downloaded file is too small ($size bytes), retrying..."
                  Remove-Item $cloudflaredPath -Force -ErrorAction SilentlyContinue
                }
              }
            } catch {
              Write-Warning "Download attempt $retry failed: $_"
              Start-Sleep -Seconds 2
            }
          }
          
          if (-not $downloadSuccess) {
            Write-Error "Failed to download cloudflared after $maxRetries attempts"
            Write-Host "DVR will still be accessible at http://localhost:8080"
            $cloudflaredPath = $null
          }
          
          if ($cloudflaredPath -and (Test-Path $cloudflaredPath)) {
            Write-Host "Creating cloudflared wrapper script (with auto-reconnect)..."
            
            # Create a PowerShell wrapper script (like DVR's wrapper) with restart loop
            $tunnelWrapperScript = "$repoDir\start-tunnel.ps1"
            $tunnelLogPath = "$repoDir\tunnel.log"
            $tunnelUrlFile = "$repoDir\tunnel-url.txt"
            
            $tunnelWrapperLines = @(
              "# Cloudflared tunnel wrapper with auto-reconnect",
              "`$logFile = `"$tunnelLogPath`"",
              "`$tunnelUrlFile = `"$tunnelUrlFile`"",
              "`$cloudflared = `"$cloudflaredPath`"",
              "`$repoDir = `"$repoDir`"",
              "",
              "# Set proxy for cloudflared edge connection (HTTP_PROXY works with cloudflared)",
              "`$env:HTTP_PROXY = `"http://127.0.0.1:8888`"",
              "`$env:HTTPS_PROXY = `"http://127.0.0.1:8888`"",
              "# Fallback: try SOCKS5 directly if HTTP proxy is not available",
              "if (-not (Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue)) {",
              "    Remove-Item Env:HTTP_PROXY -ErrorAction SilentlyContinue",
              "    Remove-Item Env:HTTPS_PROXY -ErrorAction SilentlyContinue",
              "    Write-Host `"[Tunnel Wrapper] No HTTP proxy on 8888, connecting directly`"",
              "}",
              "",
              "while (`$true) {",
              "    Write-Host `"[Tunnel Wrapper] Starting cloudflared tunnel at `$(Get-Date)`"",
              "    `$stderrFile = Join-Path `$repoDir `"cloudflared-stderr.log`"",
              "    if (Test-Path `$stderrFile) { Remove-Item `$stderrFile -Force }",
              "",
              "    `$args = `"tunnel --url http://localhost:8080 --protocol http2`"",
              "    `$proc = Start-Process -FilePath `$cloudflared -ArgumentList `$args -WorkingDirectory `$repoDir -NoNewWindow -RedirectStandardError `$stderrFile -PassThru",
              "",
              "    # Poll stderr file for tunnel URL (cloudflared prints it to stderr)",
              "    `$urlFound = `$false",
              "    for (`$i = 0; `$i -lt 30; `$i++) {",
              "        Start-Sleep -Seconds 2",
              "        if (-not (Test-Path `$stderrFile)) { continue }",
              "        `$content = Get-Content `$stderrFile -Raw -ErrorAction SilentlyContinue",
              "        if (`$content -match 'https://[a-z0-9\\-]+\\.trycloudflare\\.com') {",
              "            `$url = `$urlMatch.Value",
              "            `$url | Set-Content -Path `$tunnelUrlFile -Force",
              "            `$url | Out-File -FilePath `$logFile -Append",
              "            Write-Host `"[Tunnel Wrapper] Tunnel URL: `$url`"",
              "            `$urlFound = `$true",
              "            break",
              "        }",
              "    }",
              "",
              "    if (-not `$urlFound) {",
              "        `$errContent = Get-Content `$stderrFile -Raw -ErrorAction SilentlyContinue",
              "        if (`$errContent) { `$errContent | Out-File -FilePath `$logFile -Append }",
              "        Write-Host `"[Tunnel Wrapper] No URL found, restarting in 10s...`"",
              "    }",
              "",
              "    # Wait for process to exit (tunnel disconnected)",
              "    `$proc.WaitForExit()",
              "    Write-Host `"[Tunnel Wrapper] Tunnel disconnected, restarting in 10s...`"",
              "    Start-Sleep -Seconds 10",
              "}"
            )
            $tunnelWrapperContent = $tunnelWrapperLines -join "`r`n"
            Set-Content -Path $tunnelWrapperScript -Value $tunnelWrapperContent -Force
            Write-Host "[OK] Created cloudflared wrapper script: $tunnelWrapperScript"
            
            # Remove existing task if present
            Unregister-ScheduledTask -TaskName "CloudflareTunnel" -Confirm:$false -ErrorAction SilentlyContinue
            
            # Create scheduled task that runs the wrapper
            $tunnelAction = New-ScheduledTaskAction `
              -Execute "powershell.exe" `
              -Argument "-ExecutionPolicy Bypass -NoProfile -File `"$tunnelWrapperScript`"" `
              -WorkingDirectory $repoDir
            $tunnelTrigger = New-ScheduledTaskTrigger -AtStartup
            $tunnelTrigger.Delay = "PT30S"
            $tunnelPrincipal = New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest
            $tunnelSettings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -DontStopOnIdleEnd -ExecutionTimeLimit (New-TimeSpan -Days 0)
            
            Register-ScheduledTask -TaskName "CloudflareTunnel" -Action $tunnelAction -Trigger $tunnelTrigger -Principal $tunnelPrincipal -Settings $tunnelSettings -Force | Out-Null
            Write-Host "[OK] Cloudflared tunnel scheduled task created"
            
            # Verify cloudflared task was created
            try {
              $cfTask = Get-ScheduledTask -TaskName "CloudflareTunnel" -ErrorAction Stop
              Write-Host "[OK] Verified cloudflared task exists in Task Scheduler (State: $($cfTask.State))"
            } catch {
              Write-Error "Failed to verify cloudflared scheduled task: $_"
              $cfTaskExists = schtasks /Query /TN "CloudflareTunnel" 2>&1
              if ($LASTEXITCODE -ne 0) {
                Write-Error "Cloudflared task was not created successfully"
              }
            }
            
            Write-Host "[OK] Cloudflared tunnel scheduled task created (for reboot persistence)"
          }

      - name: Configure Proxy for DVR and Browsers
        shell: powershell
        run: |
          # Use socks-to-http-proxy (simpler than 3proxy)
          $proxyUrl = $env:ALL_PROXY
          
          if ($proxyUrl -match 'socks5://([^:]+):(\d+)') {
            $proxyHost = $matches[1]
            $proxyPort = $matches[2]
            
            Write-Host "=== Setting up Proxy ==="
            Write-Host "Netherlands SOCKS5: $proxyHost`:$proxyPort"
            Write-Host ""
            
            $s2hExe = "C:\proxy\socks-to-http-proxy.exe"
            $alreadyRunning = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
            
            if (-not $alreadyRunning) {
              # Download socks-to-http-proxy (single executable, no configuration needed)
              Write-Host "Downloading socks-to-http-proxy..."
              $s2hUrl = "https://github.com/KaranGauswami/socks-to-http-proxy/releases/download/v0.5.0/sthp-windows.exe"
              
              try {
                New-Item -ItemType Directory -Force -Path "C:\proxy" | Out-Null
                Invoke-WebRequest -Uri $s2hUrl -OutFile $s2hExe -UseBasicParsing -TimeoutSec 30
                
                if (Test-Path $s2hExe) {
                  Write-Host "[OK] socks-to-http-proxy downloaded"
                  
                  # sthp CLI: -p <local-port> -s <socks5-host:port>
                  $proxyArgs = "-p 8888 -s ${proxyHost}:${proxyPort}"
                  Start-Process -FilePath $s2hExe -ArgumentList $proxyArgs -WindowStyle Hidden
                  
                  $started = $false
                  for ($i = 0; $i -lt 15; $i++) {
                    Start-Sleep -Seconds 1
                    $listening = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
                    if ($listening) { $started = $true; break }
                  }
                  if (-not $started) {
                    Write-Warning "socks-to-http-proxy did not bind to port 8888 within 15s"
                  }
                }
              } catch {
                Write-Warning "Proxy setup failed: $_"
                Write-Host "DVR will still work with direct SOCKS5"
              }
            } else {
              Write-Host "[OK] HTTP proxy already running on port 8888"
            }
            
            # Check if it's running
            $listening = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
                if ($listening) {
                  Write-Host "[OK] HTTP proxy running on localhost:8888"
                  
                  # Configure Windows to use the HTTP proxy
                  reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyEnable /t REG_DWORD /d 1 /f | Out-Null
                  reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyServer /t REG_SZ /d "127.0.0.1:8888" /f | Out-Null
                  reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyOverride /t REG_SZ /d "localhost;127.*;10.*;172.*;192.168.*;*.local;<local>" /f | Out-Null
                  Write-Host "[OK] Browser proxy configured"
                  
                  # Test the proxy chain
                  Write-Host ""
                  Write-Host "Testing proxy chain..."
                  Start-Sleep -Seconds 2
                  $ipViaProxy = curl.exe -x http://127.0.0.1:8888 -s -m 15 https://api.ipify.org 2>$null
                  $LASTEXITCODE = 0
                  if ($ipViaProxy -eq $proxyHost) {
                    Write-Host "[SUCCESS] Proxy works! Browser will show: $ipViaProxy (Netherlands)"
                  } elseif ($ipViaProxy) {
                    Write-Host "[INFO] Proxy returned IP: $ipViaProxy"
                  } else {
                    Write-Host "[WARNING] Proxy test timed out - may need more time to connect"
                  }
                  
                  Write-Host ""
                  Write-Host "[SUCCESS] Proxy setup complete"
                  Write-Host "  - Open browser in RDP and visit chaturbate.com"
                  Write-Host "  - Should show Netherlands (no age verification)"
                } else {
                  Write-Warning "Proxy not listening on port 8888"
                }
            
          } else {
            Write-Warning "Could not parse SOCKS5 proxy URL: $proxyUrl"
          }
          $LASTEXITCODE = 0
          exit 0

      - name: Show Connection Details
