name: Secure RDP
run-name: Secure RDP${{ github.event.inputs.triggered_by == 'workflow-watchman' && ' (watchman)' || '' }}

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      triggered_by:
        description: 'Source of the trigger'
        required: false
        default: ''

permissions:
  contents: read
  actions: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Init
        shell: powershell
        run: |
          # Cleanup any stale DVR from previous runs
          Get-Process chaturbate-dvr -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Process cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Unregister-ScheduledTask -TaskName "ChaturbateDVR" -Confirm:$false -ErrorAction SilentlyContinue
          Unregister-ScheduledTask -TaskName "CloudflareTunnel" -Confirm:$false -ErrorAction SilentlyContinue
          # Don't delete videos/ - they contain completed recordings
          $repoName = ($env:GITHUB_REPOSITORY -split '/')[-1]
          echo "REPO_DIR=D:\repos\$repoName" >> $env:GITHUB_ENV
          Remove-Item "D:\repos\$repoName\tunnel-url.txt" -Force -ErrorAction SilentlyContinue
          $epoch = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          echo "START_TIME=$epoch" >> $env:GITHUB_ENV
          $r = gh run list --workflow secure-rdp.yml --repo "$env:GITHUB_REPOSITORY" --limit 10 --json databaseId,status,startedAt 2>$null | ConvertFrom-Json
          if ($r) { foreach ($run in $r) { if ($run.databaseId -ne $env:GITHUB_RUN_ID -and $run.status -eq 'in_progress' -and (([DateTime]::UtcNow - [DateTime]::Parse($run.startedAt).ToUniversalTime()).TotalMinutes -lt 348)) { gh run cancel $env:GITHUB_RUN_ID --repo "$env:GITHUB_REPOSITORY"; Start-Sleep -Seconds 60; exit 1 } } }

      - uses: actions/cache@v4
        with:
          path: |
            ~\go\pkg\mod
            D:\repos
            ~\AppData\Local\pip\Cache
            ~\.cache\ms-playwright
            ~\.cache\tailscale.msi
            C:\proxy
            C:\ProgramData\chocolatey\cache
            C:\cloudflared
          key: ${{ runner.os }}-cache-${{ hashFiles('go.sum', '**/*.go', 'cmd/grab_cookies/**') }}
          restore-keys: |
            ${{ runner.os }}-cache-
            ${{ runner.os }}-

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Parallel Setup
        shell: powershell
        env:
          PROXY_URLS: ${{ secrets.PROXY_URLS }}
          MINI_ENV: ${{ secrets.MINI_ENV }}
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
          CHANNEL_POOL_MODE: ${{ secrets.CHANNEL_POOL_MODE }}
          NODE_ID: ${{ secrets.NODE_ID }}
          SESSION_DURATION: ${{ secrets.SESSION_DURATION }}
          VIDHIDE_API_KEY: ${{ secrets.VIDHIDE_API_KEY }}
          STREAMWISH_API_KEY: ${{ secrets.STREAMWISH_API_KEY }}
          UPNSHARE_KEY: ${{ secrets.UPNSHARE_KEY }}
          DOODSTREAM_API_KEY: ${{ secrets.DOODSTREAM_API_KEY }}
          VOESX_API_KEY: ${{ secrets.VOESX_API_KEY }}
          AFFILIATE_WM: ${{ secrets.AFFILIATE_WM }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          $repoDir = "$env:REPO_DIR"
          $proxyFile = "$env:TEMP\_proxy"
          $rdpPassFile = "$env:TEMP\_rdppass"
          $tailscaleOk = "$env:TEMP\_ts_ok"
          $tailscaleIpFile = "$env:TEMP\_ts_ip"

          # Capture env vars for $using: in jobs (Start-Job can't see $env: directly)
          $mMiniEnv = $env:MINI_ENV
          $mTsAuthKey = $env:TAILSCALE_AUTH_KEY
          $mChannelPool = $env:CHANNEL_POOL_MODE
          $mNodeId = $env:NODE_ID
          $mSessionDur = $env:SESSION_DURATION
          $mVidhideKey = $env:VIDHIDE_API_KEY
          $mStreamwishKey = $env:STREAMWISH_API_KEY
          $mUpnshareKey = $env:UPNSHARE_KEY
            $mDoodstreamKey = $env:DOODSTREAM_API_KEY
          $mVoeKey = $env:VOESX_API_KEY
          $mAffWm = $env:AFFILIATE_WM
          $mRunId = $env:GITHUB_RUN_ID

          # ========== JOB: Proxy Discovery ==========
          $proxyJob = Start-Job -Name proxy -ScriptBlock {
            param($f)
            function l { param($m) Write-Host $m; [System.Console]::Out.Flush() }

            $secret = "$env:PROXY_URLS"
            if (-not [string]::IsNullOrWhiteSpace($secret)) {
              $list = @($secret -split '[,\s]+' | Where-Object { $_ -match '^socks5://' })
              if ($list.Count -gt 0) {
                "$($list -join ',')|$($list[0])" | Set-Content $f -Force
                l "[OK] Proxy from secret"; return
              }
            }

            l "Fetching proxies..."
            $urls = @(
              'https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&format=text&protocol=socks5&country=nl&timeout=5000'
              'https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&format=text&protocol=socks5&country=in&timeout=5000'
              'https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&format=text&protocol=socks5&country=de&timeout=5000'
              'https://raw.githubusercontent.com/monosans/proxy-list/main/proxies/socks5.txt'
              'https://raw.githubusercontent.com/hookzof/socks5_list/master/proxy.txt'
              'https://cdn.jsdelivr.net/gh/proxyscrape/free-proxy-list@main/proxies/countries/nl/socks5/data.txt'
            )
            $fb = { param($u) try { (Invoke-RestMethod -Uri $u -TimeoutSec 8 -ErrorAction Stop) -split "`n" } catch { @() } }
            $jobs = $urls | ForEach-Object { Start-Job -ScriptBlock $fb -ArgumentList $_ }
            $null = $jobs | Wait-Job -Timeout 15
            $all = @(); foreach ($j in $jobs) { $all += Receive-Job $j; Remove-Job $j -Force }
            $all = ($all | ForEach-Object { $t = $_.Trim(); if ($t -match '^socks5://') { $t } elseif ($t -match '^(\d+\.\d+\.\d+\.\d+):(\d+)$') { "socks5://$t" } } | Where-Object { $_ } | Select-Object -Unique) | Select-Object -First 80
            if ($all.Count -eq 0) { $all = @("socks5://5.255.117.250:1080","socks5://185.233.184.165:1080") }
            l "  Fetched $($all.Count)"

            # Liveness
            $ab = { param($u) try { $ip = curl.exe -x $u -s --connect-timeout 2 -m 4 https://api.ipify.org 2>$null; if ($ip -match '^\d+\.\d+\.\d+\.\d+$') { return @{url=$u; ip=$ip.Trim()} } } catch {}; return $null }
            $alive = [System.Collections.ArrayList]@()
            for ($i = 0; $i -lt $all.Count; $i += 30) {
              $batch = $all[$i..([math]::Min($i+29,$all.Count-1))]
              $jbs = $batch | ForEach-Object { Start-Job -ScriptBlock $ab -ArgumentList $_ }
              $null = $jbs | Wait-Job -Timeout 15
              foreach ($j in $jbs) { $r = Receive-Job $j; if ($r -and $r.url) { [void]$alive.Add($r) }; Remove-Job $j -Force }
              if ($alive.Count -ge 20) { break }
            }
            l "  Alive: $($alive.Count)"

            # Chaturbate check
            $cb = { param($w) try { $out = curl.exe -x $w.url -s -o NUL -w "%{http_code} %{url_effective}" -L --connect-timeout 2 -m 6 https://chaturbate.com 2>$null; $p = $out -split ' ',2; return @{url=$w.url; ip=$w.ip; code=[int]$p[0]; finalUrl=if($p.Count-gt1){$p[1]}else{''}} } catch { return $null } }
            $cj = $alive | ForEach-Object { Start-Job -ScriptBlock $cb -ArgumentList $_ }
            $null = $cj | Wait-Job -Timeout 15
            $clean = [System.Collections.ArrayList]@()
            foreach ($j in $cj) { $r = Receive-Job $j; if ($r -and $r.code -eq 200 -and $r.finalUrl -notmatch '(?i)(verify|auth|captcha|face|human|robot)') { [void]$clean.Add($r) }; Remove-Job $j -Force }
            l "  CB-OK: $($clean.Count)"
            if ($clean.Count -eq 0) { $clean = $alive | Select-Object -First 2 }
            $working = $clean | Select-Object -First 3
            "$($working.ForEach{ $_.url } -join ',')|$($working[0].url)" | Set-Content $f -Force
            l "[OK] $($working.Count) proxies: $($working[0].url)"
          } -ArgumentList $proxyFile

          # ========== JOB: RDP Config + User ==========
          $rdpJob = Start-Job -Name rdp -ScriptBlock {
            param($pf)
            Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' fDenyTSConnections 0 -Force
            Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' UserAuthentication 0 -Force
            Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' fSingleSessionPerUser 0 -Force
            Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False -ErrorAction SilentlyContinue
            Stop-Service mpssvc -Force -ErrorAction SilentlyContinue; Set-Service mpssvc -StartupType Disabled -ErrorAction SilentlyContinue
            Restart-Service TermService -Force
            $chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'
            $p = -join ((1..20) | ForEach-Object { $chars[(Get-Random -Maximum $chars.Length)] })
            $sp = ConvertTo-SecureString $p -AsPlainText -Force
            if (Get-LocalUser "RDP" -ErrorAction SilentlyContinue) { Remove-LocalUser "RDP" }
            New-LocalUser "RDP" -Password $sp -AccountNeverExpires -PasswordNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RDP"
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
            $p | Set-Content $pf -Force
          } -ArgumentList $rdpPassFile

          # ========== JOB: Tailscale Install (cached MSI) ==========
          $tsInstallJob = Start-Job -Name tsi -ScriptBlock {
            $msiDir = "$env:USERPROFILE\.cache"
            New-Item -ItemType Directory -Force -Path $msiDir | Out-Null
            $i = "$msiDir\tailscale.msi"
            if (-not (Test-Path $i) -or ((Get-Item $i).Length -lt 5MB)) {
              Write-Host "[TAILSCALE] Downloading MSI..."
              $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
              Invoke-WebRequest -Uri $url -OutFile $i -UseBasicParsing -TimeoutSec 60
            } else {
              Write-Host "[TAILSCALE] Using cached MSI"
            }
            Write-Host "[TAILSCALE] Installing..."
            $t = Measure-Command { Start-Process msiexec.exe -ArgumentList "/i `"$i`" /qn /norestart" -Wait }
            Write-Host "[TAILSCALE] Installed in $([math]::Round($t.TotalSeconds,1))s"
          }

          # ========== JOB: FFmpeg Install (cached by choco) ==========
          $ffJob = Start-Job -Name ffmpeg -ScriptBlock {
            Remove-Item Env:ALL_PROXY,Env:all_proxy,Env:HTTP_PROXY,Env:HTTPS_PROXY,Env:http_proxy,Env:https_proxy -ErrorAction SilentlyContinue
            $env:NO_PROXY = "community.chocolatey.org,chocolatey.org"
            Write-Host "[FFMPEG] Installing..."
            $t = Measure-Command { choco install ffmpeg -y --no-progress 2>&1 | Out-Null }
            Write-Host "[FFMPEG] Done in $([math]::Round($t.TotalSeconds,1))s"
          }

          # ========== JOB: Clone + Build (skip if cached) ==========
          $buildJob = Start-Job -Name build -ScriptBlock {
            param($d)
            New-Item -ItemType Directory -Force -Path "D:\repos" | Out-Null
            if (-not (Test-Path "$d\chaturbate-dvr.exe") -or -not (Test-Path "$d\grab-cookies.exe")) {
              if (Test-Path $d) { Remove-Item -Recurse -Force $d }
              New-Item -ItemType Directory -Force -Path $d | Out-Null
              Copy-Item -Path "$env:GITHUB_WORKSPACE\*" -Destination $d -Recurse -Force
              Set-Location $d
              Write-Host "[BUILD] Building Go binaries..."
              $sa = $env:ALL_PROXY; Remove-Item Env:ALL_PROXY,Env:all_proxy,Env:HTTP_PROXY,Env:HTTPS_PROXY,Env:http_proxy,Env:https_proxy -ErrorAction SilentlyContinue
              $env:GOPROXY = "https://proxy.golang.org,direct"
              foreach ($bin in @("grab-cookies.exe ./cmd/grab_cookies", "chaturbate-dvr.exe .")) {
                $parts = $bin -split ' ', 2
                $name = $parts[0]; $pkg = $parts[1]
                $ok = $false
                for ($attempt = 0; $attempt -lt 3; $attempt++) {
                  $t = [Diagnostics.Stopwatch]::StartNew()
                  $out = go build -ldflags="-s -w" -o $name $pkg 2>&1
                  $t.Stop(); $exit = $LASTEXITCODE
                  if ($exit -eq 0) { Write-Host "[BUILD] $($name): $([math]::Round($t.Elapsed.TotalSeconds,1))s"; $ok = $true; break }
                  Write-Host "[BUILD] $name attempt $($attempt+1) failed (exit $exit), retrying..."
                  Start-Sleep -Seconds 2
                }
                if (-not $ok) { Write-Error "[BUILD] $name failed after 3 attempts" }
              }
              if ($sa) { $env:ALL_PROXY = $sa; $env:all_proxy = $sa }
            } else { Write-Host "[BUILD] Using cached binaries" }
          } -ArgumentList $repoDir

          # ========== JOB: Python Deps Install (cached) ==========
          $scrapleJob = Start-Job -Name scrapling -ScriptBlock {
            $sa = $env:ALL_PROXY; Remove-Item Env:ALL_PROXY,Env:all_proxy,Env:HTTP_PROXY,Env:HTTPS_PROXY,Env:http_proxy,Env:https_proxy -ErrorAction SilentlyContinue
            Write-Host "[PYTHON] Installing scrapling..."
            $t1 = Measure-Command { pip install "scrapling[fetchers]" 2>&1 | Out-Null }
            Write-Host "[PYTHON] scrapling: $([math]::Round($t1.TotalSeconds,1))s"
            Write-Host "[PYTHON] Installing playwright chromium..."
            $t2 = Measure-Command { python -m playwright install chromium 2>&1 | Out-Null }
            Write-Host "[PYTHON] playwright: $([math]::Round($t2.TotalSeconds,1))s"
            Write-Host "[PYTHON] Installing pysocks..."
            pip install pysocks 2>&1 | Out-Null
            if ($sa) { $env:ALL_PROXY = $sa; $env:all_proxy = $sa }
          }

          # ========== WAIT for RDP + TS Install + FFmpeg (fast, no proxy needed) ==========
          Write-Host "[MAIN] Waiting for RDP, Tailscale, FFmpeg..."; $null = [System.Console]::Out.Flush()
          $null = $rdpJob, $tsInstallJob, $ffJob | Wait-Job -Timeout 90
          $rdpPassword = Receive-Job $rdpJob -ErrorAction SilentlyContinue
          if ($rdpPassword) { echo "RDP_PASSWORD=$rdpPassword" >> $env:GITHUB_ENV; Write-Host "[OK] RDP user created" } else { Write-Warning "[RDP] No password received" }
          Receive-Job $tsInstallJob -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "[TS] $_" }
          Receive-Job $ffJob -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
          Remove-Job $rdpJob, $tsInstallJob, $ffJob -Force -ErrorAction SilentlyContinue

          # ========== JOB: Tailscale Connect (depends on install) ==========
          $tsConnectJob = Start-Job -Name tsc -ArgumentList $tailscaleOk, $tailscaleIpFile, $mTsAuthKey, $mRunId -ScriptBlock {
            param($okFile, $ipFile, $authKey, $runId)
            $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
            $svc = Get-Service Tailscale -ErrorAction SilentlyContinue
            if (-not $svc) { return }
            if ($svc.Status -ne 'Running') { Start-Service Tailscale -ErrorAction Stop }
            for ($i = 0; $i -lt 15; $i++) { try { $out = & $ts status 2>&1; if ($LASTEXITCODE -eq 0 -or ($out -match "Logged out|NeedsLogin|Running|stopped")) { break } } catch {}; Start-Sleep -Seconds 2 }
            & $ts up --authkey="$authKey" --hostname="github-rdp-$runId" --accept-routes --accept-dns=false --timeout=60s
            if ($LASTEXITCODE -ne 0) { return }
            for ($attempt = 0; $attempt -lt 2; $attempt++) {
              for ($i = 0; $i -lt 15; $i++) { try { $ip = (& $ts ip -4 2>&1 | Select-Object -First 1).Trim(); if ($ip -match '^\d+\.\d+\.\d+\.\d+$') { $ip | Set-Content $ipFile -Force; return } } catch {}; Start-Sleep -Seconds 3 }
              & $ts logout; Start-Sleep -Seconds 3
              & $ts up --authkey="$authKey" --hostname="github-rdp-$runId" --accept-routes --accept-dns=false --timeout=60s --reset
              Start-Sleep -Seconds 5
            }
          }

          # ========== WAIT for Proxy (critical path) ==========
          Write-Host "[MAIN] Waiting for proxy discovery..."; $null = [System.Console]::Out.Flush()
          $null = $proxyJob | Wait-Job -Timeout 40
          if ($proxyJob.State -eq 'Running') { Write-Warning "[PROXY] Timeout, continuing with fallback" }
          Receive-Job $proxyJob -ErrorAction SilentlyContinue | Out-Null
          Remove-Job $proxyJob -Force -ErrorAction SilentlyContinue
          $proxyResult = if (Test-Path $proxyFile) { Get-Content $proxyFile -Raw } else { $null }
          if ($proxyResult -and ($proxyResult -match '^(.+?)\|(.+)$')) {
            $proxyList = $matches[1]; $primary = $matches[2]
            echo "PROXY_URL=$proxyList" >> $env:GITHUB_ENV
            echo "ALL_PROXY=$primary" >> $env:GITHUB_ENV
            echo "SOCKS_PROXY=$primary" >> $env:GITHUB_ENV
            $env:PROXY_URL = $proxyList; $env:ALL_PROXY = $primary; $env:SOCKS_PROXY = $primary
            & git config --global http.proxy $primary; & git config --global https.proxy $primary
            Write-Host "[OK] Primary proxy: $primary ($($proxyList.Split(',').Count) total)"
          } else { Write-Warning "[PROXY] No valid proxy found, DVR may fail" }

          # ========== WAIT for Build + Scrapling ==========
          Write-Host "[MAIN] Waiting for builds + Scrapling..."; $null = [System.Console]::Out.Flush()
          $null = $buildJob, $scrapleJob | Wait-Job -Timeout 120
          Receive-Job $buildJob -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
          Receive-Job $scrapleJob -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
          Remove-Job $buildJob, $scrapleJob -Force -ErrorAction SilentlyContinue
          if (-not (Test-Path "$repoDir\chaturbate-dvr.exe")) { Write-Error "[FATAL] DVR binary not built"; exit 1 }
          Write-Host "[OK] chaturbate-dvr.exe: $((Get-Item "$repoDir\chaturbate-dvr.exe").Length / 1MB) MB"

          # ========== .env + grab_cookies ==========
          Write-Host "[MAIN] Writing .env + running grab_cookies..."
          Set-Location $repoDir
          if (-not [string]::IsNullOrWhiteSpace($env:MINI_ENV)) {
            [System.IO.File]::WriteAllText("$repoDir\.env", $env:MINI_ENV, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "[.env] Written from secret ($($env:MINI_ENV.Length) chars)"
            if (-not [string]::IsNullOrWhiteSpace($env:VOESX_API_KEY)) {
              $ev = Get-Content "$repoDir\.env" -Raw
              if ($ev -match '(?m)^VOESX_API_KEY=') { $ev = $ev -replace '(?m)^VOESX_API_KEY=.*$', "VOESX_API_KEY=$env:VOESX_API_KEY" } else { $ev = $ev.TrimEnd("`r","`n") + "`nVOESX_API_KEY=$env:VOESX_API_KEY`n" }
              [System.IO.File]::WriteAllText("$repoDir\.env", $ev, (New-Object System.Text.UTF8Encoding($false)))
              Write-Host "[.env] VOESX_API_KEY set from secret"
            }
            if (-not [string]::IsNullOrWhiteSpace($env:AFFILIATE_WM)) {
              $ev = Get-Content "$repoDir\.env" -Raw
              if ($ev -match '(?m)^AFFILIATE_WM=') { $ev = $ev -replace '(?m)^AFFILIATE_WM=.*$', "AFFILIATE_WM=$env:AFFILIATE_WM" } else { $ev = $ev.TrimEnd("`r","`n") + "`nAFFILIATE_WM=$env:AFFILIATE_WM`n" }
              [System.IO.File]::WriteAllText("$repoDir\.env", $ev, (New-Object System.Text.UTF8Encoding($false)))
              Write-Host "[.env] AFFILIATE_WM set from secret"
            }
          } else { Write-Warning "[.env] MINI_ENV secret is empty" }
          if (Test-Path ".\grab-cookies.exe") {
            Write-Host "[GRABBER] Running cookie grabber..."
            $gt = Measure-Command { .\grab-cookies.exe 2>&1 | Out-Null }
            Write-Host "[GRABBER] Exit code: $LASTEXITCODE, took $([math]::Round($gt.TotalSeconds,1))s"
            Remove-Item ".\grab-cookies.exe" -Force -ErrorAction SilentlyContinue
          } else { Write-Warning "[GRABBER] grab-cookies.exe not built" }
          $freshEnv = Get-Content "$repoDir\.env" -Raw -ErrorAction SilentlyContinue
          $hasCookies = $freshEnv -match '(?m)^COOKIES='
          $hasUA = $freshEnv -match '(?m)^USER_AGENT='
          $freshCookies = if ($hasCookies) { $matches[0] } else { "" }
          $freshUA = if ($hasUA) { $matches[0] } else { "" }
          Write-Host "[.env] After grabber - Cookies: $(if($hasCookies){'present'}else{'MISSING'}), UA: $(if($hasUA){'present'}else{'MISSING'})"
          if ($freshCookies -ne "") {
            $c = Get-Content "$repoDir\.env" -Raw -ErrorAction SilentlyContinue
            if ($c) {
              $c = $c -replace '(?m)^COOKIES=.*$', $freshCookies
              if ($freshUA -ne "") { $c = $c -replace '(?m)^USER_AGENT=.*$', $freshUA }
              [System.IO.File]::WriteAllText("$repoDir\.env", $c, (New-Object System.Text.UTF8Encoding($false)))
              Write-Host "[.env] Final: $((Get-Item "$repoDir\.env").Length) bytes, cookies preserved"
            }
          } else { Write-Warning "[.env] No fresh cookies - DVR will use secret fallback" }

          # Append Supabase credentials from secrets into .env so the DVR
          # (launched as a SYSTEM scheduled task) can read them from the file.
          # The .env is written from MINI_ENV above; these lines are merged in
          # without disturbing cookies / upload keys already present.
          if (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_URL)) {
            $sb = Get-Content "$repoDir\.env" -Raw -ErrorAction SilentlyContinue
            if ($sb -eq $null) { $sb = "" }
            function SetOrAdd($k, $v) {
              if ($sb -match "(?m)^$k=") { $script:sb = $sb -replace "(?m)^$k=.*`$", "$k=$v" }
              else { $script:sb = $sb.TrimEnd("`r","`n") + "`n$k=$v`n" }
            }
            SetOrAdd "SUPABASE_URL" $env:SUPABASE_URL
            SetOrAdd "SUPABASE_API_KEY" $env:SUPABASE_API_KEY
            SetOrAdd "SUPABASE_SERVICE_ROLE_KEY" $env:SUPABASE_SERVICE_ROLE_KEY
            SetOrAdd "DATABASE_PASSWORD" $env:DATABASE_PASSWORD
            [System.IO.File]::WriteAllText("$repoDir\.env", $sb, (New-Object System.Text.UTF8Encoding($false)))
            Write-Host "[.env] Supabase vars merged (SUPABASE_URL present: $(if($sb -match 'SUPABASE_URL='){'yes'}else{'no'}))"
          } else { Write-Warning "[.env] SUPABASE_URL secret empty - skipping Supabase merge" }

          # Capture proxy for child jobs (starts after proxy is resolved)
          $mAllProxy = $env:ALL_PROXY

          # ========== Browser Proxy (SOCKS5 â†’ HTTP, cached) ==========
          $bpJob = Start-Job -Name browserproxy -ArgumentList $mAllProxy -ScriptBlock {
            param($proxyUrl)
            if ($proxyUrl -match 'socks5://([^:]+):(\d+)') {
              $h = $matches[1]; $p = $matches[2]
              $run = Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue
              if (-not $run) {
                $exe = "C:\proxy\socks-to-http-proxy.exe"
                New-Item -ItemType Directory -Force -Path "C:\proxy" | Out-Null
                if (-not (Test-Path $exe) -or ((Get-Item $exe).Length -lt 100KB)) {
                  Write-Host "[PROXY] Downloading socks-to-http-proxy..."
                  try {
                    Invoke-WebRequest -Uri "https://github.com/KaranGauswami/socks-to-http-proxy/releases/download/v0.5.0/sthp-windows.exe" -OutFile $exe -UseBasicParsing -TimeoutSec 30
                  } catch { Write-Warning "[PROXY] Download failed: $_" }
                } else { Write-Host "[PROXY] Using cached socks-to-http-proxy" }
                if (Test-Path $exe) {
                  Write-Host "[PROXY] Starting on port 8888..."
                  $null = Start-Process -FilePath $exe -ArgumentList "-p 8888 -s ${h}:${p}" -WindowStyle Hidden -PassThru
                  for ($i = 0; $i -lt 15; $i++) { Start-Sleep -Seconds 1; if (Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue) { Write-Host "[PROXY] Listening on 8888"; break } }
                }
              } else { Write-Host "[PROXY] Already running on 8888" }
              if (Get-NetTCPConnection -LocalPort 8888 -State Listen -ErrorAction SilentlyContinue) {
                reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyEnable /t REG_DWORD /d 1 /f | Out-Null
                reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Internet Settings" /v ProxyServer /t REG_SZ /d "127.0.0.1:8888" /f | Out-Null
                try { $ip = curl.exe -x http://127.0.0.1:8888 -s -m 15 https://api.ipify.org 2>$null; Write-Host "[PROXY] Browser via proxy: $ip" } catch { Write-Warning "[PROXY] Test failed" }
              }
            }
          }

          # ========== Scheduled Tasks + Cloudflared ==========
          $stJob = Start-Job -Name tasks -ArgumentList $repoDir, $mAllProxy, $mChannelPool, $mNodeId,           $mSessionDur, $mVidhideKey, $mStreamwishKey, $mUpnshareKey, $mDoodstreamKey, $mVoeKey, $mAffWm -ScriptBlock {
            param($d, $pUrl, $cPool, $nId, $sDur, $vKey, $swKey, $uKey, $dKey, $voeKey, $affWm)
            $dvrExe = "$d\chaturbate-dvr.exe"
            $videosDir = "D:\videos"; New-Item -ItemType Directory -Force -Path $videosDir | Out-Null

            # Cloudflared (cached at C:\cloudflared\)
            $cfCache = "C:\cloudflared\cloudflared.exe"
            New-Item -ItemType Directory -Force -Path "C:\cloudflared" | Out-Null
            if (-not (Test-Path $cfCache) -or ((Get-Item $cfCache).Length -lt 1MB)) {
              Write-Host "[CLOUDFLARED] Downloading..."
              for ($r = 1; $r -le 3; $r++) { try { Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile $cfCache -UseBasicParsing -TimeoutSec 30; break } catch { Start-Sleep -Seconds 2 } }
            } else { Write-Host "[CLOUDFLARED] Using cached binary" }
            Copy-Item $cfCache "$d\cloudflared.exe" -Force
            $cfPath = "$d\cloudflared.exe"
            if ((Get-Item $cfPath -ErrorAction SilentlyContinue).Length -lt 1MB) { $cfPath = $null }

            $script = "$d\start-dvr.ps1"
            Set-Content -Path $script -Value (@(
              "# DVR Wrapper",
              "`$env:TEMP = `"D:\temp`"", "`$env:TMP = `"D:\temp`"", "`$env:TMPDIR = `"D:\temp`"",
              "New-Item -ItemType Directory -Force -Path `"D:\temp`" | Out-Null",
              "`$env:ALL_PROXY = `"$pUrl`"", "`$env:all_proxy = `"$pUrl`"", "`$env:SOCKS_PROXY = `"$pUrl`""
              "`$env:CHANNEL_POOL_MODE = `"$cPool`"", "`$env:NODE_ID = `"$nId`""
              "`$env:SESSION_DURATION = `"$sDur`""
              "`$env:VIDHIDE_API_KEY = `"$vKey`"", "`$env:STREAMWISH_API_KEY = `"$swKey`""
              "`$env:UPNSHARE_KEY = `"$uKey`"", "`$env:DOODSTREAM_API_KEY = `"$dKey`"", "`$env:VOESX_API_KEY = `"$voeKey`"", "`$env:AFFILIATE_WM = `"$affWm`""
              "Remove-Item Env:HTTP_PROXY,Env:HTTPS_PROXY,Env:http_proxy,Env:https_proxy -ErrorAction SilentlyContinue"
              "Set-Location `"$d`"", "& `"$dvrExe`" --no-tunnel --output-dir `"$videosDir`" *>&1 | Tee-Object -FilePath `"$d\dvr-output.log`" -Append"
            ) -join "`r`n") -Force
            Unregister-ScheduledTask -TaskName "ChaturbateDVR" -Confirm:$false -ErrorAction SilentlyContinue
            $a = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -NoProfile -File `"$script`"" -WorkingDirectory $d
            Register-ScheduledTask -TaskName "ChaturbateDVR" -Action $a -Trigger (New-ScheduledTaskTrigger -AtStartup) -Principal (New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest) -Settings (New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -DontStopOnIdleEnd -ExecutionTimeLimit (New-TimeSpan -Hours 0)) -Force | Out-Null

            if ($cfPath) {
              $tw = "$d\start-tunnel.ps1"
              Set-Content -Path $tw -Value (@(
                "while (`$true) {", "  Write-Host `"[Tunnel] Starting...`""
                "  `$e = `"$d\tunnel-stderr.log`"; if (Test-Path `$e) { Remove-Item `$e -Force }"
                "  `$p = Start-Process -FilePath `"$cfPath`" -ArgumentList `"tunnel --url http://localhost:8080 --protocol http2`" -WorkingDirectory `"$d`" -NoNewWindow -RedirectStandardError `$e -PassThru"
                "  for (`$i = 0; `$i -lt 30; `$i++) { Start-Sleep -Seconds 2; if (Test-Path `$e) { `$c = Get-Content `$e -Raw; if (`$c -match 'https://[a-z0-9\\-]+\\.trycloudflare\\.com') { Write-Host `"[Tunnel] URL: `$(`$matches[0])`"; break } } }"
                "  `$p.WaitForExit(); Start-Sleep -Seconds 10", "}"
              ) -join "`r`n") -Force
              Unregister-ScheduledTask -TaskName "CloudflareTunnel" -Confirm:$false -ErrorAction SilentlyContinue
              $ta = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -NoProfile -File `"$tw`"" -WorkingDirectory $d
              $tt = New-ScheduledTaskTrigger -AtStartup; $tt.Delay = "PT30S"
              Register-ScheduledTask -TaskName "CloudflareTunnel" -Action $ta -Trigger $tt -Principal (New-ScheduledTaskPrincipal -UserId "SYSTEM" -LogonType ServiceAccount -RunLevel Highest) -Settings (New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable -DontStopOnIdleEnd -ExecutionTimeLimit (New-TimeSpan -Hours 0)) -Force | Out-Null
            }
          }

          # ========== WAIT for TS Connect + Browser Proxy + Scheduled Tasks (parallel) ==========
          Write-Host "[MAIN] Waiting for Tailscale connect, browser proxy, scheduled tasks..."; $null = [System.Console]::Out.Flush()
          $null = $tsConnectJob, $bpJob, $stJob | Wait-Job -Timeout 90
          $tsIp = Receive-Job $tsConnectJob -ErrorAction SilentlyContinue
          if (Test-Path $tailscaleIpFile) { $tsIp = Get-Content $tailscaleIpFile; echo "TAILSCALE_IP=$tsIp" >> $env:GITHUB_ENV; Write-Host "[OK] Tailscale: $tsIp" } else { Write-Warning "[TS] No Tailscale IP" }
          Receive-Job $bpJob -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
          Receive-Job $stJob -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }
          Remove-Job $tsConnectJob, $bpJob, $stJob -Force -ErrorAction SilentlyContinue
          $setupElapsed = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds() - [int64]$env:START_TIME
          Write-Host "[MAIN] === Parallel setup complete in $setupElapsed s ==="

      - name: Keep Runner Alive
        shell: powershell
        env:
          CHANNEL_POOL_MODE: ${{ secrets.CHANNEL_POOL_MODE }}
          NODE_ID: ${{ secrets.NODE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
        run: |
          $repoDir = "$env:REPO_DIR"; $dvrExe = "$repoDir\chaturbate-dvr.exe"; $videosDir = "D:\videos"
          $dvrLog = "$repoDir\dvr-output.log"; $tunnelUrlFile = "$repoDir\tunnel-url.txt"; $uploadFlag = "$repoDir\upload-complete.flag"
          $cloudflaredPath = "$repoDir\cloudflared.exe"
          $tsIp = "$env:TAILSCALE_IP"

          Write-Host "========================================"
          Write-Host "  RDP VIA TAILSCALE"
          Write-Host "========================================"
          Write-Host "Tailscale IP: $tsIp"
          # The RDP user's password is randomly generated by the RDP-setup job
          # and written to $env:TEMP\_rdppass on this runner. Surface THAT
          # (don't rely on the RDP_PASSWORD secret, which is unrelated/empty).
          $rdpPass = $null
          for ($i = 0; $i -lt 30; $i++) {
            $rdpPass = Get-Content "$env:TEMP\_rdppass" -ErrorAction SilentlyContinue
            if ($rdpPass) { break }
            Start-Sleep -Seconds 2
          }
          if (-not $rdpPass) { $rdpPass = $env:RDP_PASSWORD }
          Write-Host "Username: RDP"
          Write-Host "Password: $rdpPass"
          Write-Host "mstsc /v:$tsIp"

          Set-Location $repoDir
          $env:TEMP = "D:\temp"; $env:TMP = "D:\temp"; $env:TMPDIR = "D:\temp"
          New-Item -ItemType Directory -Force -Path "D:\temp" | Out-Null
          Write-Host ("[DISK] C: free=" + [math]::Round((Get-PSDrive C).Free/1GB,1) + "GB  D: free=" + [math]::Round((Get-PSDrive D).Free/1GB,1) + "GB")
          Remove-Item Env:HTTP_PROXY,Env:HTTPS_PROXY,Env:http_proxy,Env:https_proxy -ErrorAction SilentlyContinue
          $env:SESSION_DURATION = "${{ secrets.SESSION_DURATION }}"
          $env:VIDHIDE_API_KEY = "${{ secrets.VIDHIDE_API_KEY }}"; $env:STREAMWISH_API_KEY = "${{ secrets.STREAMWISH_API_KEY }}"
          $env:UPNSHARE_KEY = "${{ secrets.UPNSHARE_KEY }}"; $env:DOODSTREAM_API_KEY = "${{ secrets.DOODSTREAM_API_KEY }}"
          $env:VOESX_API_KEY = "${{ secrets.VOESX_API_KEY }}"
          $env:AFFILIATE_WM = "${{ secrets.AFFILIATE_WM }}"
          $dvr = Start-Process -FilePath $dvrExe -ArgumentList "--no-tunnel --output-dir `"$videosDir`"" -WorkingDirectory $repoDir -NoNewWindow -RedirectStandardOutput $dvrLog -RedirectStandardError "$repoDir\dvr-err.log" -PassThru
          $dvrPid = if ($dvr -and $dvr.Id) { $dvr.Id } else { "?" }

          # Start cloudflared tunnel in parallel (retries until port 8080 is up)
          $tunnelUrl = $null; $tun = $null; $tunnelJob = $null
          $turlTemp = "D:\temp\_turl"
          if (Test-Path $cloudflaredPath) {
            $stderr = "$repoDir\tunnel-stderr.log"
            $tun = Start-Process -FilePath $cloudflaredPath -ArgumentList "tunnel --url http://localhost:8080 --protocol http2" -WorkingDirectory $repoDir -NoNewWindow -RedirectStandardError $stderr -PassThru
            if ($tun) { $tunnelJob = Start-Job -ScriptBlock { param($f,$o) for ($i = 0; $i -lt 30; $i++) { Start-Sleep -Seconds 1; if (Test-Path $f) { $c = Get-Content $f -Raw; $m = [regex]::Match($c, 'https://[a-z0-9\-]+\.trycloudflare\.com'); if ($m.Success) { $m.Value | Set-Content $o -Force; return $m.Value } } }; return $null } -ArgumentList $stderr,$turlTemp }
          }

          if ($dvrPid -ne "?") { Write-Host "[OK] DVR PID: $dvrPid" }
          for ($i = 0; $i -lt 90; $i++) {
            if ($dvr.HasExited) { Write-Host "[ERROR] DVR exited (code: $($dvr.ExitCode))"; Get-Content $dvrLog -Tail 20; break }
            if (Get-NetTCPConnection -LocalPort 8080 -State Listen -ErrorAction SilentlyContinue) { break }
            Start-Sleep -Seconds 2
          }
          Write-Host "[OK] DVR on port 8080"
          for ($i = 0; $i -lt 10; $i++) { try { Invoke-WebRequest -Uri "http://localhost:8080" -TimeoutSec 3 -UseBasicParsing -ErrorAction Stop | Out-Null; break } catch { if ($_.Exception.Response.StatusCode -eq 404) { break }; Start-Sleep -Seconds 2 } }

          if ($tunnelJob) { $null = $tunnelJob | Wait-Job -Timeout 30 -ErrorAction SilentlyContinue; $tunnelUrl = Receive-Job $tunnelJob -ErrorAction SilentlyContinue; Remove-Job $tunnelJob -Force -ErrorAction SilentlyContinue }
          if (-not $tunnelUrl -and (Test-Path $turlTemp)) { $tunnelUrl = (Get-Content $turlTemp -Raw).Trim() }
          function Shorten-Url {
            param($u)
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            $enc = [uri]::EscapeDataString($u)
            try { $r = Invoke-RestMethod -Uri "https://tinyurl.com/api-create.php?url=$enc" -TimeoutSec 15 -ErrorAction Stop; if ($r) { return "$r" } } catch {}
            try { $r = Invoke-RestMethod -Uri "https://is.gd/create.php?format=simple&url=$enc" -TimeoutSec 15 -ErrorAction Stop; if ($r) { return "$r" } } catch {}
            try { $r = Invoke-RestMethod -Uri "https://v.gd/create.php?format=simple&url=$enc" -TimeoutSec 15 -ErrorAction Stop; if ($r) { return "$r" } } catch {}
            try { $r = Invoke-RestMethod -Uri "https://clck.ru/--?url=$enc" -TimeoutSec 15 -ErrorAction Stop; if ($r) { return "$r" } } catch {}
            return $null
          }
          function Get-NodeId {
            if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_REPOSITORY)) {
              $parts = $env:GITHUB_REPOSITORY -split '/'
              if ($parts.Count -ge 2) { return $parts[1] }
            }
            if (-not [string]::IsNullOrWhiteSpace($env:NODE_ID)) { return $env:NODE_ID }
            return $null
          }
          function Update-NodeWebUrl {
            param($nodeId, $url)
            if ([string]::IsNullOrWhiteSpace($nodeId)) { Write-Warning "[WARN] nodeId is empty - skipping web_url update"; return }
            # Resolve Supabase credentials. Prefer the runner env (GitHub secrets),
            # then fall back to the .env file written earlier in the pipeline.
            $sbUrl = if (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_URL)) { $env:SUPABASE_URL.Trim() } else { $null }
            $sbKey = if (-not [string]::IsNullOrWhiteSpace($env:SUPABASE_API_KEY)) { $env:SUPABASE_API_KEY.Trim() } else { $null }
            if (-not $sbUrl -or -not $sbKey) {
              $sb = Get-Content "$repoDir\.env" -Raw -ErrorAction SilentlyContinue
              if ($sb) {
                if (-not $sbUrl -and ($sb -match '(?m)^SUPABASE_URL=(.+)$')) { $sbUrl = $matches[1].Trim() }
                if (-not $sbKey -and ($sb -match '(?m)^SUPABASE_API_KEY=(.+)$')) { $sbKey = $matches[1].Trim() }
              }
            }
            if ([string]::IsNullOrWhiteSpace($sbUrl)) { Write-Warning "[WARN] SUPABASE_URL missing (no secret, no .env) - cannot update web_url"; return }
            if ([string]::IsNullOrWhiteSpace($sbKey)) { Write-Warning "[WARN] SUPABASE_API_KEY missing (no secret, no .env) - cannot update web_url"; return }
            $body = @{ web_url = $url } | ConvertTo-Json -Compress
            $apiUrl = "$sbUrl/rest/v1/nodes?node_id=eq.$([uri]::EscapeDataString($nodeId))"
            # Force TLS 1.2 (the default protocol on the runner causes
            # "The underlying connection was closed" against Supabase).
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            $ok = $false
            for ($attempt = 1; $attempt -le 4; $attempt++) {
              try {
                Invoke-RestMethod -Uri $apiUrl -Method Patch -Body $body -ContentType "application/json" -Headers @{ "apikey" = $sbKey; "Authorization" = "Bearer $sbKey" } -TimeoutSec 25 -ErrorAction Stop | Out-Null
                Write-Host "[OK] Updated node $nodeId web_url in Supabase (attempt $attempt)"
                $ok = $true; break
              } catch {
                Write-Warning "[WARN] web_url update attempt $attempt failed: $_"
                if ($attempt -lt 4) { Start-Sleep -Seconds 3 }
              }
            }
            if (-not $ok) { Write-Warning "[WARN] Failed to update web_url after 4 attempts" }
          }
          $myNodeId = Get-NodeId
          Write-Host "[OK] Node ID: $myNodeId"
          $cachedShortUrl = $null; $lastTunnelUrl = $null

          # Enable Tailscale Funnel for public internet access (fallback when trycloudflare is rate-limited)
          $funnelUrl = $null
          $tsExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (Test-Path $tsExe) {
            try {
              & $tsExe funnel 8080 2>&1 | Out-Null
              $fs = & $tsExe funnel status 2>&1 | Out-String
              if ($fs -match 'https://[a-z0-9\-]+\.[a-z0-9\-]+\.ts\.net') {
                $funnelUrl = $matches[0].Trim()
                Write-Host "[OK] Tailscale Funnel: $funnelUrl"
              }
            } catch { Write-Host "[WARN] Tailscale Funnel: $_" }
          }

          if ($tunnelUrl -and $myNodeId) {
            $tunnelUrl | Set-Content $tunnelUrlFile -Force
            $cachedShortUrl = Shorten-Url $tunnelUrl
            $lastTunnelUrl = $tunnelUrl
            if ($cachedShortUrl) {
              Write-Host "[OK] Dashboard: $cachedShortUrl"
              if ($env:GITHUB_STEP_SUMMARY) { "## Dashboard" | Out-File $env:GITHUB_STEP_SUMMARY -Encoding utf8; "Open your RDP dashboard: [$cachedShortUrl]($cachedShortUrl)" | Out-File $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append }
            } else {
              Write-Host "[OK] Visit dashboard via nodes page artifact or nodes page"
            }
            Update-NodeWebUrl $myNodeId "$tunnelUrl"
          } elseif ($funnelUrl -and $myNodeId) {
            Write-Host "[OK] Using Tailscale Funnel: $funnelUrl"
            Update-NodeWebUrl $myNodeId "$funnelUrl"
          }

          Remove-Item $uploadFlag -Force -ErrorAction SilentlyContinue
          $startTime = if ($env:START_TIME) { [int64]$env:START_TIME } else { [DateTimeOffset]::UtcNow.ToUnixTimeSeconds() }
          $targetDuration = 355 * 60
          while ($true) {
            $now = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds(); $elapsed = $now - $startTime
            if ($elapsed -ge $targetDuration) { break }
            $sleepSecs = [Math]::Min($targetDuration - $elapsed, 60)
            if ($sleepSecs -le 0) { break }
            if ($dvr.HasExited) {
              Write-Host "[WARN] DVR exited (code: $($dvr.ExitCode)) - restarting..."
              # NOTE: in PowerShell, `number + "string"` is NUMERIC addition (it
              # coerces the string to a number), not concatenation â€” so
              # `... + "m0s"` throws "Cannot convert value 'm0s' to System.Int32".
              # Use string interpolation to force concatenation.
              $env:SESSION_DURATION = "$([Math]::Max(1, [math]::Floor((5*3600+20*60 - $elapsed)/60)))m0s"
              $dvr = Start-Process -FilePath $dvrExe -ArgumentList "--no-tunnel --output-dir `"$videosDir`"" -WorkingDirectory $repoDir -NoNewWindow -RedirectStandardOutput $dvrLog -RedirectStandardError "$repoDir\dvr-err.log" -PassThru
            }
            if ($tun -and $tun.HasExited) {
              Write-Host "[WARN] Tunnel exited - restarting..."
              $stderr = "$repoDir\tunnel-stderr.log"; if (Test-Path $stderr) { Remove-Item $stderr -Force }
              $tun = Start-Process -FilePath $cloudflaredPath -ArgumentList "tunnel --url http://localhost:8080 --protocol http2" -WorkingDirectory $repoDir -NoNewWindow -RedirectStandardError $stderr -PassThru
              Start-Sleep -Seconds 10
              if (Test-Path $stderr) { $c = Get-Content $stderr -Raw; $m = [regex]::Match($c, 'https://[a-z0-9\-]+\.trycloudflare\.com'); if ($m.Success) { $tunnelUrl = $m.Value; $tunnelUrl | Set-Content $tunnelUrlFile -Force; $cachedShortUrl = Shorten-Url $tunnelUrl; $lastTunnelUrl = $tunnelUrl; if ($cachedShortUrl) { Write-Host "[OK] Dashboard restarted: $cachedShortUrl" } else { Write-Host "[OK] Tunnel restarted - download artifact for link" }; Update-NodeWebUrl $myNodeId "$tunnelUrl" } }
            }
            if ($tunnelUrl -and $tunnelUrl -ne $lastTunnelUrl) { $cachedShortUrl = Shorten-Url $tunnelUrl; $lastTunnelUrl = $tunnelUrl }
            # Fallback: use Tailscale Funnel when trycloudflare is unavailable
            if (-not $tunnelUrl -and $funnelUrl -and $myNodeId -and -not $lastTunnelUrl) {
              Write-Host "[OK] Tunnel unavailable - using Tailscale Funnel: $funnelUrl"
              Update-NodeWebUrl $myNodeId "$funnelUrl"
              $lastTunnelUrl = $funnelUrl
            }
            $pub = if ($cachedShortUrl) { " | $cachedShortUrl" } elseif ($tunnelUrl) { " | $tunnelUrl" } elseif ($funnelUrl) { " | $funnelUrl" } else { "" }
            $now = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
            Write-Host "[$now] $tsIp$pub (Elapsed: $([Math]::Round($elapsed/60,1))m)"
            Start-Sleep -Seconds $sleepSecs
          }
          $waitStart = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          while (-not (Test-Path $uploadFlag) -and ([DateTimeOffset]::UtcNow.ToUnixTimeSeconds() - $waitStart) -lt 240) { Start-Sleep -Seconds 15 }
          if (Test-Path $uploadFlag) { Remove-Item $uploadFlag -Force }
          gh workflow run secure-rdp.yml --repo $env:GITHUB_REPOSITORY --ref $env:GITHUB_REF_NAME

      - name: Restore Network for Upload
        if: always()
        shell: powershell
        run: |
          Write-Host "[NET] Restoring Windows Firewall..."
          Start-Service mpssvc -ErrorAction SilentlyContinue
          Set-Service mpssvc -StartupType Automatic -ErrorAction SilentlyContinue
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled True -ErrorAction SilentlyContinue
          Remove-Item Env:ALL_PROXY,Env:all_proxy,Env:HTTP_PROXY,Env:HTTPS_PROXY,Env:http_proxy,Env:https_proxy -ErrorAction SilentlyContinue
          [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
          Write-Host "[NET] Restored"

      - name: Upload Tunnel URL
        if: always() && !cancelled()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
        with:
          name: tunnel-url
          path: ${{ env.REPO_DIR }}\tunnel-url.txt
          if-no-files-found: ignore

      - name: Cleanup on Cancel
        if: always()
        shell: powershell
        run: |
          Write-Host "[CLEANUP] Killing DVR and tunnel processes..."
          Get-Process chaturbate-dvr -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-Process cloudflared -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Unregister-ScheduledTask -TaskName "ChaturbateDVR" -Confirm:$false -ErrorAction SilentlyContinue
          Unregister-ScheduledTask -TaskName "CloudflareTunnel" -Confirm:$false -ErrorAction SilentlyContinue
          Remove-Item "$env:REPO_DIR\tunnel-url.txt" -Force -ErrorAction SilentlyContinue
          Write-Host "[CLEANUP] Done"
