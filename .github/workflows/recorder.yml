name: 24/7 Recorder

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: Recording duration in hours (1-5)
        required: false
        default: "5"
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/recorder.yml
      - '**/*.go'
      - go.mod
      - go.sum
      - Dockerfile
      - docker-compose.yml

concurrency:
  group: recorder
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  APP_URL: http://localhost:8080
  COMPOSE_PROJECT_NAME: recorder
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
  STREAMTAPE_LOGIN: ${{ secrets.STREAMTAPE_LOGIN }}
  STREAMTAPE_API_KEY: ${{ secrets.STREAMTAPE_API_KEY }}
  VOESX_API_KEY: ${{ secrets.VOESX_API_KEY }}
  SENDCM_API_KEY: ${{ secrets.SENDCM_API_KEY }}
  GOFILE_API_KEY: ${{ secrets.GOFILE_API_KEY }}
  BYSE_API_KEY: ${{ secrets.BYSE_API_KEY }}
  PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
  PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
  PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

jobs:
  record:
    name: Record and upload
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Prepare workspace
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p videos database emergency-backup

          # .env is required by docker-compose.yml but not in git (secrets)
          # Secrets are passed via job-level env vars; .env just needs to exist
          touch .env

          # Install jq for JSON parsing
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Disk space:"
          df -h /

      - name: Validate configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          duration="${{ inputs.duration_hours || '5' }}"
          if ! [[ "$duration" =~ ^[0-9]+$ ]]; then
            echo "duration_hours must be a whole number."
            exit 1
          fi

          if (( duration < 1 || duration > 5 )); then
            echo "duration_hours must be between 1 and 5 on GitHub-hosted runners."
            exit 1
          fi

          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_API_KEY}" ]]; then
            echo "SUPABASE_URL and SUPABASE_API_KEY secrets are required."
            exit 1
          fi

          echo "DURATION_HOURS=$duration" >> "$GITHUB_ENV"
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Ensure Supabase app_settings table
        shell: bash
        run: |
          set -euo pipefail

          # The app_settings table is required by the Go code (stored via REST API).
          # We check if it's accessible and warn if not.
          HTTP_CODE=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 10 \
            "${SUPABASE_URL}/rest/v1/app_settings?key=eq.__healthcheck__&select=key&limit=1" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" 2>/dev/null || echo "000")

          case "$HTTP_CODE" in
            200) echo "app_settings table is accessible via REST API." ;;
            404) echo "WARNING: app_settings table not found (HTTP 404)."
                 echo "Run supabase/migrations/000_complete_setup_all_tables.sql in your Supabase SQL editor." ;;
            401|403) echo "WARNING: authentication failed (HTTP $HTTP_CODE). Check SUPABASE_API_KEY." ;;
            *)   echo "WARNING: unexpected response (HTTP $HTTP_CODE)." ;;
          esac

      - name: Start containers
        shell: bash
        run: |
          set -euo pipefail

          echo "Starting Byparr + nginx first..."
          docker compose up -d --scale byparr=2 byparr byparr-lb

          echo "=== Container status after byparr start ==="
          docker compose ps -a

          echo "Waiting for Byparr load balancer..."
          for attempt in {1..30}; do
            if curl -fsS --max-time 5 http://localhost:8191/health >/dev/null 2>/dev/null; then
              echo "Byparr load balancer is up"
              break
            fi
            if (( attempt == 30 )); then
              echo "Byparr LB did not start in time"
              docker compose ps -a
              docker compose logs --tail=20 byparr-lb || true
              exit 1
            fi
            sleep 4
          done

          echo "Waiting for Byparr backend to be ready..."
          for attempt in {1..45}; do
            if curl -fsS --max-time 10 http://localhost:8191/backend-health >/dev/null 2>/dev/null; then
              echo "Byparr backend is healthy"
              break
            fi
            if (( attempt == 45 )); then
              echo "Byparr did not become healthy in time — continuing anyway (cookie-refresher will retry)"
              docker compose logs --tail=20 byparr || true
            fi
            sleep 4
          done

          echo "Starting chaturbate-dvr and uploader..."
          docker compose up -d --build chaturbate-dvr uploader

          echo "=== Full container status ==="
          docker compose ps -a

      - name: Wait for web UI
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for recorder web UI..."
          for attempt in {1..45}; do
            if curl -fsS --max-time 5 "$APP_URL" >/dev/null 2>/dev/null; then
              echo "Web UI is ready"
              exit 0
            fi

            if ! docker compose ps --services | grep -qx "chaturbate-dvr"; then
              echo "chaturbate-dvr stopped before becoming ready"
              docker compose logs --tail=100 chaturbate-dvr
              exit 1
            fi

            sleep 2
          done

          echo "Web UI did not become ready in time"
          docker compose ps
          docker compose logs --tail=150 chaturbate-dvr
          exit 1

      - name: Install cloudflared
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start Cloudflare tunnel
        id: tunnel
        shell: bash
        run: |
          set -euo pipefail

          # Clean stale cloudflared state that can cause JSON parse errors
          rm -rf ~/.cloudflared

          tunnel_url=""

          # ── Attempt 1: cloudflared quick tunnel ──────────────────────────
          for retry in {1..3}; do
            echo "cloudflared attempt $retry/3..."
            rm -f tunnel.log tunnel.pid
            cloudflared tunnel --url "$APP_URL" --no-autoupdate > tunnel.log 2>&1 &
            echo "$!" > tunnel.pid

            for attempt in {1..24}; do
              tunnel_url="$(grep -oE 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log 2>/dev/null | head -n 1 || true)"
              if [[ -n "$tunnel_url" ]]; then
                break 2
              fi
              sleep 5
            done

            kill "$(cat tunnel.pid)" 2>/dev/null || true
            wait "$(cat tunnel.pid)" 2>/dev/null || true
            sleep 3
          done

          # ── Attempt 2: localhost.run fallback ────────────────────────────
          if [[ -z "$tunnel_url" ]]; then
            echo "cloudflared failed — trying localhost.run..."
            rm -f tunnel.log tunnel.pid
            ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
              -R 80:localhost:8080 nokey@localhost.run > tunnel.log 2>&1 &
            echo "$!" > tunnel.pid

            for attempt in {1..24}; do
              tunnel_url="$(grep -oE 'https://[a-zA-Z0-9.-]+\.lhr\.life' tunnel.log 2>/dev/null | head -n 1 || true)"
              if [[ -n "$tunnel_url" ]]; then
                echo "Tunnel via localhost.run: $tunnel_url"
                break
              fi
              sleep 5
            done
          fi

          if [[ -z "$tunnel_url" ]]; then
            echo "No tunnel could be created — recording still works locally."
            echo "TUNNEL_URL=" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "$tunnel_url" > tunnel_url.txt
          echo "TUNNEL_URL=$tunnel_url" >> "$GITHUB_ENV"
          echo "url=$tunnel_url" >> "$GITHUB_OUTPUT"

          # Verify tunnel is reachable
          status=""
          for attempt in {1..12}; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 15 "$tunnel_url" 2>/dev/null || echo "000")"
            if [[ "$status" == "200" ]]; then
              echo "Tunnel is reachable"
              break
            fi
            echo "  Tunnel verification attempt $attempt: HTTP $status"
            sleep 5
          done

          if [[ "$status" != "200" ]]; then
            echo "WARNING: Tunnel URL not verified as reachable (last status: $status) — recording still works locally"
          fi

          # Save tunnel URL to Supabase
          curl -fsS -X POST "${SUPABASE_URL}/rest/v1/tunnel_sessions" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"run_id\": ${GITHUB_RUN_NUMBER}, \"url\": \"${tunnel_url}\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
            2>/dev/null || echo "Could not save tunnel URL to Supabase tunnel_sessions table."

          # Also persist to the app_settings table (read by the Go code at runtime)
          curl -fsS -X POST "${SUPABASE_URL}/rest/v1/app_settings" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"key\": \"tunnel_url\", \"value\": \"${tunnel_url}\"}" \
            2>/dev/null || true

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Recorder run"
            echo
            echo "- Run: ${GITHUB_RUN_NUMBER}"
            echo "- Duration: ${DURATION_HOURS:-unknown} hour(s)"
            echo "- Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            if [[ -n "${TUNNEL_URL:-}" ]]; then
              echo "- Web UI: ${TUNNEL_URL}"
            else
              echo "- Web UI: tunnel was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep recorder running
        shell: bash
        run: |
          set -euo pipefail

          finish_at="$(($(date +%s) + ${DURATION_HOURS:-0} * 3600))"
          echo "Recording for ${DURATION_HOURS:-0} hour(s) — finishing at $(date -d @${finish_at} '+%H:%M:%S UTC')"
          if (( finish_at <= $(date +%s) )); then
            echo "ERROR: DURATION_HOURS (${DURATION_HOURS:-unset}) is invalid — cannot continue"
            exit 1
          fi

          stop_recorder() {
            echo "=== Stopping recorder gracefully... ==="
            docker compose stop -t 300 chaturbate-dvr || true
            mkdir -p emergency-backup
            # Copy any remaining recordings from the container
            docker compose cp chaturbate-dvr:/usr/src/app/videos/. emergency-backup/ 2>/dev/null || true
            echo "=== Recorder stopped ==="
          }

          trap stop_recorder INT TERM

          while (( $(date +%s) < finish_at )); do
            if ! docker compose ps --services | grep -qx "chaturbate-dvr"; then
              echo "chaturbate-dvr is not running. Recent logs:"
              docker compose logs --tail=120 chaturbate-dvr || true
              # Rebuild only if the binary changed; otherwise just restart
              docker compose up -d --build chaturbate-dvr

              for attempt in {1..30}; do
                if curl -fsS --max-time 5 "$APP_URL" >/dev/null 2>/dev/null; then
                  echo "chaturbate-dvr restarted successfully."
                  break
                fi
                sleep 2
              done
            fi

            # Check if channel processes are alive inside the container
            if curl -fsS --max-time 5 "$APP_URL" >/dev/null 2>/dev/null; then
              ch_count="$(curl -sS --max-time 5 "$APP_URL" 2>/dev/null | grep -c 'channel-info' || true)"
              if (( ch_count > 0 )); then
                :
              fi
            fi

            sleep 60
          done

      - name: Back up generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p emergency-backup
          docker compose cp chaturbate-dvr:/usr/src/app/videos/. emergency-backup/ 2>/dev/null || true

          echo "Emergency backup contents:"
          find emergency-backup -maxdepth 2 -type f -printf '%p\n' | head -100 || true

      - name: Upload emergency artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-${{ github.run_number }}
          path: emergency-backup/
          retention-days: 30
          if-no-files-found: ignore

      - name: Persist run timestamp to repository
        # All data (channels, settings, recordings, tunnel) is stored in Supabase.
        # This step just tracks that the run completed so the next run can detect gaps.
        if: always() && steps.config.outputs.valid == 'true'
        shell: bash
        run: |
          set -euo pipefail

          echo "${GITHUB_RUN_ID} $(date -u +%FT%TZ)" > last-run.txt
          git add last-run.txt
          if git diff --cached --quiet; then
            echo "No change to last-run.txt"
          else
            git -c user.name="recorder-bot" -c user.email="recorder@github" commit -m "chore: record run ${GITHUB_RUN_NUMBER}"
            git push 2>/dev/null || echo "WARNING: git push failed (race with another run)"
          fi

      - name: Queue next run
        if: always() && steps.config.outputs.valid == 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          queued_or_running="$(
            gh run list \
              --workflow "$GITHUB_WORKFLOW" \
              --limit 20 \
              --json databaseId,status \
              --jq "[.[] | select(.databaseId != ${GITHUB_RUN_ID} and (.status == \"queued\" or .status == \"in_progress\"))] | length"
          )"

          if (( queued_or_running > 0 )); then
            echo "Another recorder run is already queued or running."
            exit 0
          fi

          gh workflow run "$GITHUB_WORKFLOW" --repo "$GITHUB_REPOSITORY" \
            -f duration_hours="${{ steps.config.outputs.duration }}"
          echo "Queued the next recorder run."

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set +e

          # Mark tunnel as inactive in both tables
          if [[ -n "${SUPABASE_URL}" && -n "${SUPABASE_API_KEY}" ]]; then
            if [[ -n "${TUNNEL_URL:-}" ]]; then
              curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/tunnel_sessions?run_id=eq.${GITHUB_RUN_NUMBER}" \
                -H "apikey: ${SUPABASE_API_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"is_active\": false, \"last_seen_at\": \"$(date -u +%FT%TZ)\"}" \
                >/dev/null || true
            fi
          fi

          # Kill tunnel processes
          if [[ -f tunnel.pid ]]; then
            kill "$(cat tunnel.pid)" 2>/dev/null || true
          fi
          pkill -f cloudflared 2>/dev/null || true

          # Stop containers and clean up
          echo "Stopping services..."
          docker compose down --remove-orphans --volumes 2>/dev/null || true
          docker system prune -af --volumes 2>/dev/null || true

          echo "Cleanup complete."
