name: 24/7 Recorder

on:
  workflow_dispatch:
    inputs:
      duration_hours:
        description: Recording duration in hours (1-5)
        required: false
        default: "5"
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/recorder.yml

concurrency:
  group: recorder
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  APP_URL: http://localhost:8080
  COMPOSE_PROJECT_NAME: recorder
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
  STREAMTAPE_LOGIN: ${{ secrets.STREAMTAPE_LOGIN }}
  STREAMTAPE_API_KEY: ${{ secrets.STREAMTAPE_API_KEY }}
  VOESX_API_KEY: ${{ secrets.VOESX_API_KEY }}
  SENDCM_API_KEY: ${{ secrets.SENDCM_API_KEY }}
  GOFILE_API_KEY: ${{ secrets.GOFILE_API_KEY }}
  BYSE_API_KEY: ${{ secrets.BYSE_API_KEY }}
  PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
  PROXY_USERNAME: ${{ secrets.PROXY_USERNAME }}
  PROXY_PASSWORD: ${{ secrets.PROXY_PASSWORD }}

jobs:
  record:
    name: Record and upload
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Prepare workspace
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p videos conf database emergency-backup

          # Install jq for JSON parsing
          sudo apt-get update -qq && sudo apt-get install -y -qq jq

          echo "Workspace: $GITHUB_WORKSPACE"
          echo "Disk space:"
          df -h /

      - name: Validate configuration
        id: config
        shell: bash
        run: |
          set -euo pipefail

          duration="${{ inputs.duration_hours || '5' }}"
          if ! [[ "$duration" =~ ^[0-9]+$ ]]; then
            echo "duration_hours must be a whole number."
            exit 1
          fi

          if (( duration < 1 || duration > 5 )); then
            echo "duration_hours must be between 1 and 5 on GitHub-hosted runners."
            exit 1
          fi

          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_API_KEY}" ]]; then
            echo "SUPABASE_URL and SUPABASE_API_KEY secrets are required."
            exit 1
          fi

          echo "DURATION_HOURS=$duration" >> "$GITHUB_ENV"
          echo "RUN_VALIDATED=true" >> "$GITHUB_ENV"
          echo "duration=$duration" >> "$GITHUB_OUTPUT"
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Start Byparr (Cloudflare bypass)
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail

          echo "Starting Byparr..."
          docker compose up -d byparr byparr-lb

          echo "⏳ Waiting 60 seconds for Byparr to initialize..."
          echo "   (Playwright browser engine needs time to start without API polling)"
          sleep 60

          if docker compose ps --status running --services | grep -qx "byparr"; then
            echo "✅ Byparr container is running"
          else
            echo "⚠️  Byparr container may not have started properly"
          fi

      - name: Start recorder stack
        shell: bash
        run: |
          set -euo pipefail

          # Start remaining services (recorder, uploader, cookie-refresher)
          docker compose up -d --build chaturbate-dvr uploader cookie-refresher

          echo "Running services:"
          docker compose ps

      - name: Wait for web UI
        shell: bash
        run: |
          set -euo pipefail

          echo "Waiting for recorder web UI..."
          for attempt in {1..45}; do
            if curl -fsS --max-time 5 "$APP_URL" >/dev/null; then
              echo "✅ Web UI is ready"
              exit 0
            fi

            if ! docker compose ps --status running --services | grep -qx "chaturbate-dvr"; then
              echo "❌ chaturbate-dvr stopped before becoming ready"
              docker compose logs --tail=100 chaturbate-dvr
              exit 1
            fi

            sleep 2
          done

          echo "❌ Web UI did not become ready in time"
          docker compose ps
          docker compose logs --tail=150 chaturbate-dvr
          exit 1

      - name: Install cloudflared
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL \
            -o cloudflared.deb \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          cloudflared --version

      - name: Start Cloudflare tunnel
        id: tunnel
        shell: bash
        run: |
          set -euo pipefail

          rm -f tunnel.log tunnel.pid tunnel_url.txt
          cloudflared tunnel --url "$APP_URL" --no-autoupdate > tunnel.log 2>&1 &
          echo "$!" > tunnel.pid

          tunnel_url=""
          for attempt in {1..24}; do
            tunnel_url="$(grep -Eo 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' tunnel.log | head -n 1 || true)"
            if [[ -n "$tunnel_url" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "$tunnel_url" ]]; then
            echo "Cloudflare tunnel URL was not created."
            cat tunnel.log
            exit 1
          fi

          echo "$tunnel_url" > tunnel_url.txt
          echo "TUNNEL_URL=$tunnel_url" >> "$GITHUB_ENV"
          echo "url=$tunnel_url" >> "$GITHUB_OUTPUT"

          for attempt in {1..12}; do
            status="$(curl -sS -o /dev/null -w '%{http_code}' --connect-timeout 10 --max-time 15 "$tunnel_url" || true)"
            if [[ "$status" == "200" ]]; then
              echo "Tunnel is reachable: $tunnel_url"
              break
            fi
            sleep 5
          done

          curl -fsS -X POST "${SUPABASE_URL}/rest/v1/tunnel_sessions" \
            -H "apikey: ${SUPABASE_API_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"run_id\": ${GITHUB_RUN_NUMBER}, \"url\": \"${tunnel_url}\", \"started_at\": \"$(date -u +%FT%TZ)\", \"is_active\": true}" \
            || echo "Could not save tunnel URL to Supabase."

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Recorder run"
            echo
            echo "- Run: ${GITHUB_RUN_NUMBER}"
            echo "- Duration: ${DURATION_HOURS:-unknown} hour(s)"
            echo "- Started: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            if [[ -n "${TUNNEL_URL:-}" ]]; then
              echo "- Web UI: ${TUNNEL_URL}"
            else
              echo "- Web UI: tunnel was not created"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Keep recorder running
        shell: bash
        run: |
          set -euo pipefail

          finish_at="$(($(date +%s) + DURATION_HOURS * 3600))"
          last_heartbeat=0

          stop_recorder() {
            echo "Stopping recorder gracefully."
            docker compose stop -t 300 chaturbate-dvr || true
            mkdir -p emergency-backup
            docker compose cp chaturbate-dvr:/usr/src/app/videos/. emergency-backup/ 2>/dev/null || true
          }

          trap stop_recorder SIGINT SIGTERM

          while (( $(date +%s) < finish_at )); do
            if ! docker compose ps --status running --services | grep -qx "chaturbate-dvr"; then
              echo "chaturbate-dvr is not running. Recent logs:"
              docker compose logs --tail=120 chaturbate-dvr || true
              docker compose up -d chaturbate-dvr

              for attempt in {1..30}; do
                if curl -fsS --max-time 5 "$APP_URL" >/dev/null; then
                  echo "chaturbate-dvr restarted successfully."
                  break
                fi
                sleep 2
              done
            fi

            now="$(date +%s)"
            if (( now - last_heartbeat >= 300 )); then
              curl -fsS -X POST "${SUPABASE_URL}/rest/v1/heartbeats" \
                -H "apikey: ${SUPABASE_API_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "{\"run_id\": ${GITHUB_RUN_NUMBER}, \"timestamp\": \"$(date -u +%FT%TZ)\", \"tunnel_url\": \"${TUNNEL_URL:-}\"}" \
                >/dev/null || true
              last_heartbeat="$now"
            fi

            sleep 60
          done

      - name: Back up generated files
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p emergency-backup
          docker compose cp chaturbate-dvr:/usr/src/app/videos/. emergency-backup/ 2>/dev/null || true

          echo "Emergency backup contents:"
          find emergency-backup -maxdepth 2 -type f -printf '%p\n' | head -100 || true

      - name: Save recordings database
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f database/recordings.json ]]; then
            echo "database/recordings.json was not created."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f database/recordings.json

          if git diff --staged --quiet; then
            echo "No recordings database changes to commit."
            exit 0
          fi

          git commit -m "Update recordings database [skip ci]"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Upload emergency artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recordings-${{ github.run_number }}
          path: emergency-backup/
          retention-days: 30
          if-no-files-found: ignore

      - name: Queue next run
        if: always() && steps.config.outputs.valid == 'true' && !cancelled()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          queued_or_running="$(
            gh run list \
              --workflow "$GITHUB_WORKFLOW" \
              --limit 20 \
              --json databaseId,status \
              --jq "[.[] | select(.databaseId != ${GITHUB_RUN_ID} and (.status == \"queued\" or .status == \"in_progress\"))] | length"
          )"

          if (( queued_or_running > 0 )); then
            echo "Another recorder run is already queued or running."
            exit 0
          fi

          gh workflow run "$GITHUB_WORKFLOW" --repo "$GITHUB_REPOSITORY" \
            -f duration_hours="${{ steps.config.outputs.duration }}"
          echo "Queued the next recorder run."

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          set +e

          if [[ -n "${TUNNEL_URL:-}" ]]; then
            curl -sS -X PATCH "${SUPABASE_URL}/rest/v1/tunnel_sessions?run_id=eq.${GITHUB_RUN_NUMBER}" \
              -H "apikey: ${SUPABASE_API_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_API_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d "{\"is_active\": false, \"last_seen_at\": \"$(date -u +%FT%TZ)\"}" \
              >/dev/null || true
          fi

          if [[ -f tunnel.pid ]]; then
            kill "$(cat tunnel.pid)" 2>/dev/null || true
          fi
          pkill -f cloudflared 2>/dev/null || true

          docker compose down --remove-orphans --volumes
          docker system prune -af --volumes
