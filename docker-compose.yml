services:
  # Byparr - Scalable Cloudflare bypass service (official image)
  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    environment:
      - HOST=0.0.0.0
      - PORT=8191
      - PROXY_SERVER=${PROXY_SERVER:-}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
      - TIMEOUT=300
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/"]
      interval: 20s
      timeout: 8s
      retries: 3
      start_period: 60s
    networks:
      - recorder-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 500M

  # Nginx load balancer for Byparr instances
  byparr-lb:
    image: nginx:alpine
    container_name: byparr-lb
    ports:
      - "8191:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - byparr
    restart: unless-stopped
    networks:
      - recorder-network
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/run/nginx.pid || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Chaturbate DVR - Stream recorder (built from gogoqaz fork)
  chaturbate-dvr:
    build: .
    container_name: chaturbate-dvr
    command: ["--port", "8080", "--compress=false"]
    env_file:
      - .env
    environment:
      - FLARESOLVERR_URL=http://byparr-lb/v1
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_API_KEY=${SUPABASE_API_KEY:-}
      - VOESX_API_KEY=${VOESX_API_KEY:-}
      - STREAMTAPE_LOGIN=${STREAMTAPE_LOGIN:-}
      - STREAMTAPE_API_KEY=${STREAMTAPE_API_KEY:-}
      - SENDCM_API_KEY=${SENDCM_API_KEY:-}
      - BYSE_API_KEY=${BYSE_API_KEY:-}
      - PROXY_URL=${PROXY_URL:-${PROXY_SERVER:-}}
      - PROXY_USERNAME=${PROXY_USERNAME:-}
      - PROXY_PASSWORD=${PROXY_PASSWORD:-}
      - COOKIES=${COOKIES:-}
      - USER_AGENT=${USER_AGENT:-}
    ports:
      - "8080:8080"
    volumes:
      - ./videos:/usr/src/app/videos
      - ./database:/database
    depends_on:
      byparr-lb:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 5m
    networks:
      - recorder-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 200M

  # Uploader - Automatically upload recordings to GoFile, Streamtape, VoeSX, SendCM
  uploader:
    image: python:3.12-alpine
    container_name: uploader
    environment:
      - STREAMTAPE_API_KEY=${STREAMTAPE_API_KEY:-}
      - STREAMTAPE_LOGIN=${STREAMTAPE_LOGIN:-}
      - VOESX_API_KEY=${VOESX_API_KEY:-}
      - SENDCM_API_KEY=${SENDCM_API_KEY:-}
      - BYSE_API_KEY=${BYSE_API_KEY:-}
      - GOFILE_API_KEY=${GOFILE_API_KEY:-}
    volumes:
      - ./videos:/videos
      - ./database:/database
      - ./scripts/uploader_daemon.py:/uploader_daemon.py:ro
    command: >
      sh -c "apk add --no-cache ffmpeg > /dev/null 2>&1 && pip install requests --quiet && python /uploader_daemon.py"
    depends_on:
      chaturbate-dvr:
        condition: service_started
    networks:
      - recorder-network
    restart: unless-stopped

networks:
  recorder-network:
    driver: bridge
