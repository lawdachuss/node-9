events {
    worker_connections 2048;
}

http {
    # Upstream for Byparr instances - Docker DNS will resolve all replicas
    upstream byparr_backend {
        # Docker Compose automatically creates DNS entries for all replicas
        # byparr:8191 will round-robin across all instances
        server byparr:8191 max_fails=3 fail_timeout=10s;
        
        keepalive 64;
    }

    server {
        listen 80;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Backend readiness check for callers that need Byparr itself online.
        location /backend-health {
            access_log off;
            proxy_pass http://byparr_backend/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Byparr API endpoint
        location / {
            proxy_pass http://byparr_backend;
            proxy_http_version 1.1;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            
            # Long timeouts for Cloudflare challenges
            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            
            # Buffer entire request body before forwarding
            # This prevents "empty URL" errors when retrying on other upstreams
            proxy_request_buffering on;
            client_body_buffer_size 1m;
            
            # No buffering for response (stream it back immediately)
            proxy_buffering off;
            
            # Only retry on connection errors, not on slow responses
            proxy_next_upstream error timeout invalid_header;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 300s;
        }
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
